# ⚠️ Solo se activa con --spring.profiles.active=local
# No se despliega, no afecta producción.
# Para usar en tests de integración: @ActiveProfiles("local")

# ⚠️ Las URLs NO incluyen /api/contabilidad ni /api/core porque el @FeignClient
# ya agrega el path. Ej: url=http://localhost:9006 + path=/api/contabilidad = http://localhost:9006/api/contabilidad
client:
  ms-contabilidad:
    url: http://localhost:9006
  ms-core-maestros:
    url: http://localhost:9002
