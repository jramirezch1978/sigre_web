# ============================================================
# Restaurant.pe ERP — PostgreSQL 16 Tuning
# ============================================================
# Servidor: 16 GB RAM | 8 cores | 800 GB SSD
# PostgreSQL recibe ~3.5 GB de RAM del total del servidor.
# (reducido de 4 GB para liberar RAM al perfil de testing)
# ============================================================

# ── Memoria ────────────────────────────────────────────────
shared_buffers = '1280MB'              # ~37% de la RAM asignada al contenedor (3.5 GB)
effective_cache_size = '2688MB'        # ~75% de la RAM asignada (PG + OS cache)
work_mem = '12MB'                      # Por operación de sort/hash (250 conn × 12 MB = 3 GB worst case)
maintenance_work_mem = '192MB'         # VACUUM, CREATE INDEX, ALTER TABLE
huge_pages = 'try'

# ── WAL (Write-Ahead Log) ─────────────────────────────────
wal_buffers = '48MB'
min_wal_size = '512MB'
max_wal_size = '2GB'
checkpoint_completion_target = 0.9
wal_compression = 'lz4'

# ── Conexiones ─────────────────────────────────────────────
# 16 microservicios × pool 10 + SonarQube + test runners + admin
max_connections = 250
superuser_reserved_connections = 3

# ── Query Planner ──────────────────────────────────────────
random_page_cost = 1.1                 # SSD (no HDD, que sería 4.0)
effective_io_concurrency = 200         # SSD
default_statistics_target = 100

# ── Paralelismo (8 cores) ─────────────────────────────────
max_worker_processes = 8
max_parallel_workers_per_gather = 2    # Máx workers por query paralelo
max_parallel_workers = 4               # Total workers de paralelismo
max_parallel_maintenance_workers = 2   # VACUUM paralelo, CREATE INDEX

# ── Logging ────────────────────────────────────────────────
logging_collector = 'on'
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_rotation_age = '1d'
log_rotation_size = '100MB'
log_min_duration_statement = 500       # Loguear queries > 500ms
log_checkpoints = 'on'
log_connections = 'off'                # Muchas conexiones (pools), no loguear cada una
log_disconnections = 'off'
log_lock_waits = 'on'
log_temp_files = 0                     # Loguear todos los temp files
log_line_prefix = '%t [%p] %q%u@%d '
log_statement = 'ddl'                  # Solo DDL (no all, genera demasiado log)

# ── Autovacuum ─────────────────────────────────────────────
autovacuum = 'on'
autovacuum_max_workers = 3
autovacuum_naptime = '30s'
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50
autovacuum_vacuum_scale_factor = 0.05  # Vacuum al 5% de filas muertas (default 20%)
autovacuum_analyze_scale_factor = 0.05

# ── Locale y timezone ──────────────────────────────────────
timezone = 'America/Lima'
lc_messages = 'en_US.utf8'

# ── Replicación (preparado para réplica de lectura) ───────
wal_level = 'replica'
max_wal_senders = 3
max_replication_slots = 3
