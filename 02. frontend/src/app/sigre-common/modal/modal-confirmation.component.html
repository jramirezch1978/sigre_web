<sigre-metoxi-modal-shell
  [titulo]="title || 'Confirmación'"
  size="sm"
  [cuerpoScroll]="false"
  (cerrar)="cerrarModal(false)">
  <div class="text-center py-1">
    @if (tipemodal === 'confirm' || tipemodal === 'success') {
      <div class="sigre-metoxi-confirm__icon sigre-metoxi-confirm__icon--success">
        <i class="material-icons-outlined">check_circle</i>
      </div>
    }
    @if (tipemodal === 'error') {
      <div class="sigre-metoxi-confirm__icon sigre-metoxi-confirm__icon--error">
        <i class="material-icons-outlined">cancel</i>
      </div>
    }
    @if (tipemodal === 'warning' || tipemodal === 'info') {
      <div class="sigre-metoxi-confirm__icon sigre-metoxi-confirm__icon--warning">
        <i class="material-icons-outlined">warning_amber</i>
      </div>
    }

    @if (message) {
      <p class="mb-2 sigre-metoxi-confirm__message" [innerHTML]="message"></p>
    }
    @if (submessage) {
      <p class="mb-0 text-muted small sigre-metoxi-confirm__submessage" [innerHTML]="submessage"></p>
    }
  </div>

  <div sigreMetoxiModalFooter>
    <sigre-metoxi-modal-actions
      [mostrarCancelar]="!!btnCancelTxt"
      [mostrarPrimario]="true"
      [textoCancelar]="btnCancelTxt || 'Cancelar'"
      [textoPrimario]="btnOkTxt"
      [primarioPeligroso]="tipemodal === 'error' || tipemodal === 'warning'"
      (cancelar)="cerrarModal(false)"
      (primario)="cerrarModal(true)" />
  </div>
</sigre-metoxi-modal-shell>
