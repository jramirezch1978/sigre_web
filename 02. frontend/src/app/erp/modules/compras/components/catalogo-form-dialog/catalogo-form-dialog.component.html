<sigre-metoxi-modal-shell
  [titulo]="data.titulo"
  size="lg"
  [cerrarDeshabilitado]="guardando"
  (cerrar)="cancelar()">
  @if (cargandoOpciones) {
    <div class="sigre-metoxi-modal__loading">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Cargando…</span>
      </div>
      <span>Cargando formulario…</span>
    </div>
  } @else {
    <form [formGroup]="form" class="sigre-metoxi-form">
      <div class="row g-3">
        @for (campo of camposNoSwitch; track campo.key) {
          <erp-metoxi-form-field
            [control]="controlDe(campo)"
            [fieldId]="'campo-' + campo.key"
            [fieldKey]="campo.key"
            [label]="campo.label"
            [required]="!!campo.required"
            [type]="tipoFormField(campo)"
            colClass="col-md-6"
            [placeholder]="placeholderDe(campo)"
            [maxLength]="campo.maxLength ?? null"
            [options]="opcionesDe(campo)"
            [layout]="layoutDe(campo)" />
        }
      </div>
      @if (camposSwitch.length) {
        <div class="row g-3 mt-1">
          @for (campo of camposSwitch; track campo.key) {
            <erp-metoxi-form-field
              [control]="controlDe(campo)"
              [fieldId]="'campo-' + campo.key"
              [fieldKey]="campo.key"
              [label]="campo.label"
              [type]="'switch'"
              colClass="col-md-4"
              switchOnLabel="Activo"
              switchOffLabel="Anulado" />
          }
        </div>
      }
    </form>
  }

  <div sigreMetoxiModalFooter>
    <sigre-metoxi-modal-actions
      [mostrarCancelar]="true"
      [mostrarGuardar]="true"
      [guardando]="guardando"
      [deshabilitado]="guardando || cargandoOpciones"
      (cancelar)="cancelar()"
      (guardar)="guardar()" />
  </div>
</sigre-metoxi-modal-shell>
