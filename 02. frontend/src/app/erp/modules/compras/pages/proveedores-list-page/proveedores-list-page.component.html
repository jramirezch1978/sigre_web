<app-erp-metoxi-list-page
  modulo="Compras"
  [codigo]="codigo"
  [titulo]="nombre"
  subtitulo="Maestro de proveedores y clientes (relación comercial)"
  [totalRegistros]="conteo.total"
  [totalActivos]="conteo.activos"
  [totalInactivos]="conteo.inactivos"
  [mostrarTabsEstado]="true"
  [puedeGestionar]="true"
  [cargando]="cargando"
  textoBotonAnadir="Añadir ficha"
  [placeholderBusqueda]="'Buscar en ' + nombre + '…'"
  [(busqueda)]="busqueda"
  [(filtroTab)]="filtroTab"
  (anadir)="anadir()"
  (recargar)="recargar()">

  <app-erp-data-table
    [columnas]="columnas"
    [filas]="filasVisibles"
    [nombreExport]="nombre"
    [cargando]="cargando"
    [error]="error"
    [totalRegistros]="filasVisibles.length"
    [mostrarAcciones]="true"
    [ordenInicial]="ordenInicial"
    [tamanoPaginaPersistido]="tamanoPaginaPersistido"
    (ordenCambiado)="onOrdenCambiado($event)"
    (tamanoPaginaCambiado)="onTamanoPaginaCambiado($event)"
    (editar)="editar($event)" />
</app-erp-metoxi-list-page>
