<div class="almacen-tabla">
  <header class="almacen-tabla__header">
    <div>
      <h1>{{ titulo }}</h1>
      @if (subtitulo) {
        <p>{{ subtitulo }}</p>
      }
    </div>
    <button mat-stroked-button type="button" (click)="recargar()" [disabled]="cargando">
      <mat-icon>refresh</mat-icon>
      Actualizar
    </button>
  </header>

  <app-erp-data-table
    [columnas]="columnas"
    [filas]="filas"
    [cargando]="cargando"
    [error]="error"
    [totalRegistros]="filas.length">
  </app-erp-data-table>
</div>
