<div class="almacen-page">
  <header class="almacen-page__header">
    <div>
      <h1>{{ titulo }}</h1>
      @if (subtitulo) {
        <p class="almacen-page__subtitle">{{ subtitulo }}</p>
      }
    </div>
    <div class="almacen-page__actions">
      @if (puedeGestionar) {
        <button mat-flat-button color="primary" type="button" (click)="anadir()" [disabled]="cargando">
          <mat-icon>add</mat-icon>
          Añadir
        </button>
      }
      <button mat-stroked-button type="button" (click)="recargar()" [disabled]="cargando">
        <mat-icon>refresh</mat-icon>
        Actualizar
      </button>
    </div>
  </header>

  <app-erp-data-table
    [columnas]="columnas"
    [filas]="filas"
    [cargando]="cargando"
    [error]="error"
    [totalRegistros]="filas.length"
    [mostrarAcciones]="puedeGestionar"
    (editar)="editarRegistro($event)"
    (anular)="anularRegistro($event)"
    (eliminar)="eliminarRegistro($event)"
  />
</div>
