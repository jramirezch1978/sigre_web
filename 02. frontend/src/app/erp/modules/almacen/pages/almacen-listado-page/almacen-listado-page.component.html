<app-erp-metoxi-list-page
  modulo="Almacén"
  [titulo]="titulo"
  [subtitulo]="subtitulo"
  [totalRegistros]="conteo.total"
  [totalActivos]="conteo.activos"
  [totalInactivos]="conteo.inactivos"
  [mostrarTabsEstado]="tieneColumnaEstado"
  [puedeGestionar]="puedeGestionar"
  [cargando]="cargando"
  textoBotonAnadir="Añadir registro"
  [placeholderBusqueda]="'Buscar en ' + titulo + '…'"
  [(busqueda)]="busqueda"
  [(filtroTab)]="filtroTab"
  (anadir)="anadir()"
  (recargar)="recargar()">

  <app-erp-data-table
    [columnas]="columnas"
    [filas]="filasVisibles"
    [nombreExport]="titulo"
    [cargando]="cargando"
    [error]="error"
    [totalRegistros]="filasVisibles.length"
    [mostrarAcciones]="puedeGestionar"
    (editar)="editarRegistro($event)"
    (anular)="anularRegistro($event)"
    (eliminar)="eliminarRegistro($event)" />
</app-erp-metoxi-list-page>
