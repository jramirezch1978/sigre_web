<div class="almacen-page">
  <header class="almacen-page__header">
    <div>
      <h1>{{ titulo }}</h1>
      @if (subtitulo) {
        <p class="almacen-page__subtitle">{{ subtitulo }}</p>
      }
    </div>
    <button mat-stroked-button type="button" (click)="recargar()">
      <mat-icon>refresh</mat-icon>
      Actualizar
    </button>
  </header>

  <app-erp-data-table
    [columnas]="columnas"
    [filas]="filas"
    [cargando]="cargando"
    [error]="error"
    [totalRegistros]="filas.length"
  />
</div>
