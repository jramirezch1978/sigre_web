<button type="button"
        class="sigre-cc__toggle"
        [class.sigre-cc__toggle--placeholder]="!tieneValor"
        [class.sigre-cc__toggle--disabled]="disabled"
        [disabled]="disabled"
        cdkOverlayOrigin #aOrigin="cdkOverlayOrigin"
        (click)="toggleDropdown(aOrigin)">
  <span class="material-icons-outlined sigre-cc__toggle-ico">inventory_2</span>
  <span class="sigre-cc__valor">{{ etiquetaSeleccionada }}</span>
  <span class="sigre-cc__caret"></span>
</button>

<ng-template
  cdkConnectedOverlay
  [cdkConnectedOverlayOrigin]="aOrigin"
  [cdkConnectedOverlayOpen]="dropdownAbierto"
  [cdkConnectedOverlayWidth]="anchoPanel"
  [cdkConnectedOverlayPositions]="posicionesOverlay"
  (overlayOutsideClick)="cerrar()"
  (detach)="cerrar()">
  <div class="sigre-ss__panel">
    <div class="sigre-ss__search">
      <i class="material-icons-outlined">search</i>
      <input #ssInput type="text" class="form-control form-control-sm"
             placeholder="Buscar por código o nombre…"
             [value]="filtro" (input)="onFiltro($event)" (keydown.escape)="cerrar()" />
    </div>
    <ul class="sigre-ss__list">
      @if (cargando) {
        <li class="sigre-ss__empty">Buscando…</li>
      } @else {
        @for (a of resultados; track a.id) {
          <li class="sigre-ss__option" (click)="seleccionar(a)">{{ a.codigo }} — {{ a.nombre }}</li>
        } @empty {
          <li class="sigre-ss__empty">Sin resultados</li>
        }
      }
    </ul>
  </div>
</ng-template>
