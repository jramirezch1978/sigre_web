<button type="button"
        class="sigre-cc__toggle"
        [class.sigre-cc__toggle--placeholder]="!tieneValor"

        [disabled]="disabled"
        (click)="abrir()">
  <span class="material-icons-outlined sigre-cc__toggle-ico">account_tree</span>
  <span class="sigre-cc__valor">{{ etiquetaSeleccionada }}</span>
  <span class="material-icons-outlined sigre-cc__toggle-ico">search</span>
</button>
