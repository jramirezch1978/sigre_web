<div class="page-breadcrumb d-none d-sm-flex align-items-center mb-3">
  <div class="breadcrumb-title pe-3">{{ modulo }}</div>
  <div class="ps-3">
    <nav aria-label="breadcrumb">
      <ol class="breadcrumb mb-0 p-0">
        <li class="breadcrumb-item active" aria-current="page">
          @if (codigo) {
            <span class="text-secondary me-1">({{ codigo }})</span>
          }
          {{ titulo }}
        </li>
      </ol>
    </nav>
  </div>
</div>

@if (mostrarTabsEstado) {
  <div class="product-count d-flex align-items-center gap-3 gap-lg-4 mb-4 fw-medium flex-wrap font-text1">
    <a
      href="javascript:;"
      class="text-decoration-none"
      [class.text-primary]="filtroTab === 'todos'"
      (click)="seleccionarTab('todos')">
      <span class="me-1">Todos</span>
      <span class="text-secondary">({{ totalRegistros }})</span>
    </a>
    <a
      href="javascript:;"
      class="text-decoration-none"
      [class.text-primary]="filtroTab === 'activos'"
      (click)="seleccionarTab('activos')">
      <span class="me-1">Activos</span>
      <span class="text-secondary">({{ totalActivos }})</span>
    </a>
    <a
      href="javascript:;"
      class="text-decoration-none"
      [class.text-primary]="filtroTab === 'inactivos'"
      (click)="seleccionarTab('inactivos')">
      <span class="me-1">Inactivos</span>
      <span class="text-secondary">({{ totalInactivos }})</span>
    </a>
  </div>
}

<div class="row g-3">
  <div class="col-auto">
    <div class="position-relative">
      <input
        class="form-control px-5"
        type="search"
        [placeholder]="placeholderBusqueda"
        [ngModel]="busqueda"
        (ngModelChange)="onBusquedaInput($event)" />
      <span class="material-icons-outlined position-absolute ms-3 translate-middle-y start-0 top-50 fs-5">search</span>
    </div>
  </div>
  <div class="col-auto flex-grow-1 overflow-auto d-none d-md-block"></div>
  <div class="col-auto ms-auto">
    <div class="d-flex align-items-center gap-2 justify-content-lg-end flex-wrap">
      <button type="button" class="btn btn-filter px-4" (click)="recargar.emit()" [disabled]="cargando">
        <i class="material-icons-outlined fs-6 align-middle me-1">refresh</i>
        Actualizar
      </button>
      @if (puedeGestionar) {
        <button type="button" class="btn btn-primary px-4" (click)="anadir.emit()" [disabled]="cargando">
          <i class="material-icons-outlined fs-6 align-middle me-1">add</i>
          {{ textoBotonAnadir }}
        </button>
      }
    </div>
  </div>
</div>

<div class="card mt-4 rounded-4 mb-0 w-100">
  <div class="card-body">
    @if (subtitulo) {
      <p class="text-muted mb-3">{{ subtitulo }}</p>
    }
    <ng-content></ng-content>
  </div>
</div>
