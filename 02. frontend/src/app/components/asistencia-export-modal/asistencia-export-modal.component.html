@if (visible) {
  <div class="asistencia-export-modal__backdrop" (click)="onCerrar()">
    <div class="asistencia-export-modal" (click)="$event.stopPropagation()">
      <div class="asistencia-export-modal__header">
        <h5 class="mb-0">Exportar</h5>
        <button type="button" class="btn-close" aria-label="Cerrar" (click)="onCerrar()"></button>
      </div>
      <p class="asistencia-export-modal__hint">Elige el formato de exportación:</p>
      <div class="asistencia-export-modal__options">
        <button type="button" class="asistencia-export-opt" (click)="onExportar('excel')" [disabled]="exportando">
          <svg viewBox="0 0 32 32" width="34" height="34" role="img" aria-hidden="true">
            <rect x="4" y="2" width="24" height="28" rx="2" fill="#1d6f42"/>
            <path d="M20 2v6h6" fill="#145a32"/>
            <text x="16" y="22" text-anchor="middle" fill="#fff" font-size="8" font-weight="700" font-family="Arial,sans-serif">XLS</text>
          </svg>
          <span>Excel</span>
        </button>
        <button type="button" class="asistencia-export-opt" (click)="onExportar('word')" [disabled]="exportando">
          <svg viewBox="0 0 32 32" width="34" height="34" role="img" aria-hidden="true">
            <rect x="4" y="2" width="24" height="28" rx="2" fill="#2b579a"/>
            <path d="M20 2v6h6" fill="#1c3d6e"/>
            <text x="16" y="22" text-anchor="middle" fill="#fff" font-size="8" font-weight="700" font-family="Arial,sans-serif">DOC</text>
          </svg>
          <span>Word</span>
        </button>
        <button type="button" class="asistencia-export-opt" (click)="onExportar('pdf')" [disabled]="exportando">
          <svg viewBox="0 0 32 32" width="34" height="34" role="img" aria-hidden="true">
            <rect x="4" y="2" width="24" height="28" rx="2" fill="#dc3545"/>
            <path d="M20 2v6h6" fill="#b02a37"/>
            <text x="16" y="22" text-anchor="middle" fill="#fff" font-size="8" font-weight="700" font-family="Arial,sans-serif">PDF</text>
          </svg>
          <span>PDF</span>
        </button>
      </div>
    </div>
  </div>
}
