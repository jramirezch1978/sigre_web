<div class="container body admin-gentelella">
  <div class="main_container" [class.menu-collapsed]="!menuAbierto">
    <div class="col-md-3 left_col" [class.collapsed]="!menuAbierto">
      <div class="left_col scroll-view" [class.collapsed]="!menuAbierto">
        <div class="navbar nav_title">
          <a routerLink="/admin/inicio" class="site_title">
            <ion-icon name="shield-checkmark-outline" class="logo-icon"></ion-icon>
            @if (menuAbierto) {
              <span class="logo-text">SIGRE Admin</span>
            }
          </a>
        </div>
        <div class="clearfix"></div>
        <div class="profile clearfix">
          <div class="profile_pic">
            <ion-icon name="person-circle-outline" class="profile-avatar"></ion-icon>
          </div>
          @if (menuAbierto) {
            <div class="profile_info">
              <span>Bienvenido,</span>
              <h4>Administrador</h4>
            </div>
          }
        </div>
        <br />
        <div id="sidebar-menu" class="main_menu_side main_menu">
          <div class="menu_section">
            @if (menuAbierto) { <h3>Consola</h3> }
            <ul class="nav side-menu">
              @for (item of menuItems; track item.route) {
                <li [class.active]="isActive(item.route)">
                  <a (click)="navegar(item.route)" [title]="item.label">
                    <ion-icon [name]="item.icon"></ion-icon>
                    @if (menuAbierto) { <span>{{ item.label }}</span> }
                  </a>
                </li>
              }
            </ul>
          </div>
        </div>
        <div class="sidebar-footer">
          <button type="button" class="sidebar-footer__btn" (click)="irAlErp()" title="Ir al ERP">
            <ion-icon name="arrow-back-outline"></ion-icon>
            @if (menuAbierto) { <span>Ir al ERP</span> }
          </button>
          <button type="button" class="sidebar-footer__btn sidebar-footer__btn--danger" (click)="cerrarSesion()" title="Cerrar sesión">
            <ion-icon name="log-out-outline"></ion-icon>
            @if (menuAbierto) { <span>Cerrar sesión</span> }
          </button>
        </div>
      </div>
    </div>

    <div class="top_nav">
      <div class="nav_menu">
        <div class="nav toggle">
          <a (click)="toggleMenu()"><ion-icon name="menu-outline"></ion-icon></a>
        </div>
        <nav class="nav navbar-nav">
          <ul class="navbar-right">
            <li><span class="user-info">Administración de plataforma</span></li>
          </ul>
        </nav>
      </div>
    </div>

    <div class="right_col" role="main">
      <router-outlet></router-outlet>
    </div>
  </div>
</div>
