<div class="admin-page ion-padding admin-page--fluid">
  <div class="admin-page__head">
    <div>
      <h1 class="admin-page__title">Módulos</h1>
      <p class="admin-page__subtitle">Gestión del catálogo de módulos del sistema.</p>
    </div>
    <ion-button color="primary" (click)="abrirCrear()">
      <ion-icon slot="start" name="add-circle-outline"></ion-icon>
      Nuevo módulo
    </ion-button>
  </div>

  <ion-searchbar [(ngModel)]="filtro" placeholder="Buscar módulo..." animated="true" class="admin-search"></ion-searchbar>

  @if (loading) {
    <div class="admin-center"><ion-spinner name="crescent"></ion-spinner></div>
  }

  @if (!loading) {
    <div class="admin-table-wrapper" style="padding: 0.75rem 1rem 1rem;">
      <app-erp-data-table
        [columnas]="columnasTabla"
        [filas]="filasTabla"
        nombreExport="modulos"
        [totalRegistros]="filasTabla.length"
        [mostrarAcciones]="true"
        [mostrarAnular]="false"
        [mostrarEliminar]="false"
        (editar)="onEditarFila($event)" />
    </div>
  }
</div>

<ion-modal [isOpen]="mostrandoForm" (didDismiss)="cancelar()"
  style="--width:480px;--max-width:95vw;--border-radius:16px">
  <ng-template>
    <ion-header>
      <ion-toolbar>
        <ion-title>{{ editandoId != null ? 'Editar módulo' : 'Nuevo módulo' }}</ion-title>
        <ion-buttons slot="end">
          <ion-button (click)="cancelar()"><ion-icon slot="icon-only" name="close-outline"></ion-icon></ion-button>
        </ion-buttons>
      </ion-toolbar>
    </ion-header>
    <ion-content>
      <form [formGroup]="form" (ngSubmit)="guardar()">
        <div class="form-row">
          <ion-item>
            <ion-label position="stacked">Código <span class="req">*</span></ion-label>
            <ion-input sigreValid formControlName="codigo" maxlength="40"></ion-input>
          </ion-item>
          <ion-item>
            <ion-label position="stacked">Nombre <span class="req">*</span></ion-label>
            <ion-input sigreValid formControlName="nombre" maxlength="120"></ion-input>
          </ion-item>
        </div>
        <ion-item lines="none">
          <ion-toggle formControlName="activo" labelPlacement="end">Activo</ion-toggle>
        </ion-item>
        <div class="form-actions">
          <ion-button type="submit" color="primary">Guardar</ion-button>
          <ion-button type="button" fill="outline" color="medium" (click)="cancelar()">Cancelar</ion-button>
        </div>
      </form>
    </ion-content>
  </ng-template>
</ion-modal>
