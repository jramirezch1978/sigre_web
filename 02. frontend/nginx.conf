events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Configuración de logs
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log;

    # Configuración de compresión
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Configuración del servidor
    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        # Configuración para HTML principal - FORZAR ACTUALIZACIÓN SIEMPRE
        location = /index.html {
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate, private";
            add_header Pragma "no-cache";
            add_header Expires "0";
            add_header Last-Modified $date_gmt;
            add_header ETag off;
            if_modified_since off;
        }

        # Proxy API hacia el gateway (red Docker stack_default)
        location /api/ {
            proxy_pass http://api-gateway:9080;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }

        # Angular SPA: rutas sin archivo fisico redirigen a index.html
        location / {
            try_files $uri $uri/ /index.html;
            # index.html no se cachea (lo cubre el bloque = /index.html arriba)
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate, private";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        # Chunks Angular con hash en el nombre (ej: 9545.4538xxx.js, main.f752xxx.js)
        # Son INMUTABLES: cuando el contenido cambia, cambia el hash -> se pueden cachear indefinidamente
        # NOTA: el regex debe ir entre comillas porque { y } son caracteres especiales en nginx config
        location ~* "\.[0-9a-f]{8,}\.(js|css)$" {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            access_log off;
        }

        # Archivos JS/CSS SIN hash en el nombre (runtime, polyfills) - no cachear
        location ~* \.(js|css)$ {
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate, private";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        # Recursos estaticos (imagenes/fuentes) - cache largo
        location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, max-age=2592000";
            access_log off;
        }

        # Configuración de seguridad
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Configuración de CORS (si es necesario)
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, PUT, DELETE" always;
        add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept, Authorization" always;

        # Manejo de errores
        error_page 404 /index.html;
        error_page 500 502 503 504 /50x.html;
    }
}
