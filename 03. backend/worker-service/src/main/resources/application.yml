server:
  port: 9050

spring:
  application:
    name: worker-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:sigre_security}?sslmode=${DB_SSL_MODE:disable}
    username: ${DB_USER:postgres}
    password: "${DB_PASS:jarch32b}"

app:
  admin-datasource:
    jdbc-url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/postgres?sslmode=${DB_SSL_MODE:disable}
    username: ${DB_USER:postgres}
    password: "${DB_PASS:jarch32b}"

worker:
  licencias:
    # Vencimiento: cada hora al minuto 10. Eliminación de BD: cada hora al minuto 20.
    cron-vencimiento: "${WORKER_CRON_VENCIMIENTO:0 10 * * * *}"
    cron-eliminacion: "${WORKER_CRON_ELIMINACION:0 20 * * * *}"
    # Aviso de renovación: diario a las 08:30 (dispara el cálculo + correo en seguridad-service).
    cron-renovacion: "${WORKER_CRON_RENOVACION:0 30 8 * * *}"
  seguridad:
    base-url: "${SEGURIDAD_URL:http://seguridad-service:9001}"
    provision-secret: "${APP_PROVISION_SECRET:dev-provision-cambiar-produccion}"

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
