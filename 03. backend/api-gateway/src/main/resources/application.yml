server:
  port: 9080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # ── Autenticación y seguridad ──
        - id: seguridad-service
          uri: ${MS_AUTH_URI:http://seguridad-service:9001}
          predicates:
            - Path=/api/auth/**

        - id: seguridad-admin
          uri: ${MS_AUTH_URI:http://seguridad-service:9001}
          predicates:
            - Path=/api/admin/**

        - id: seguridad-internal
          uri: ${MS_AUTH_URI:http://seguridad-service:9001}
          predicates:
            - Path=/api/internal/tenants/**

        - id: inventory-service
          uri: lb://inventory-service
          predicates:
            - Path=/api/inventory/**
        - id: orders-service
          uri: lb://orders-service
          predicates:
            - Path=/api/order/**
        - id: products-service
          uri: lb://products-service
          predicates:
            - Path=/api/product/**
        - id: asistencia-service
          uri: lb://asistencia-service
          predicates:
            - Path=/api/asistencia/**
          filters:
            - RewritePath=/api/asistencia/(?<segment>.*), /${segment}

        - id: core-service
          uri: ${CORE_SERVICE_URI:http://core-service:9002}
          predicates:
            - Path=/api/core/**

        - id: almacen-service
          uri: ${ALMACEN_SERVICE_URI:http://almacen-service:9003}
          predicates:
            - Path=/api/almacen/**

        - id: compras-service
          uri: ${COMPRAS_SERVICE_URI:http://compras-service:9004}
          predicates:
            - Path=/api/compras/**

        - id: finanzas-service
          uri: ${FINANZAS_SERVICE_URI:http://finanzas-service:9005}
          predicates:
            - Path=/api/finanzas/**

        - id: contabilidad-service
          uri: ${CONTABILIDAD_SERVICE_URI:http://contabilidad-service:9006}
          predicates:
            - Path=/api/contabilidad/**

        - id: rrhh-service
          uri: ${RRHH_SERVICE_URI:http://rrhh-service:9007}
          predicates:
            - Path=/api/rrhh/**

        - id: produccion-service
          uri: ${PRODUCCION_SERVICE_URI:http://produccion-service:9009}
          predicates:
            - Path=/api/produccion/**

        - id: comercializacion-service
          uri: ${COMERCIALIZACION_SERVICE_URI:http://comercializacion-service:9010}
          predicates:
            - Path=/api/ventas/**

        - id: sync-service
          uri: ${SYNC_SERVICE_URI:http://sync-service:8088}
          predicates:
            - Path=/api/sync/**,/api/worker/**

        - id: discovery-service
          uri: http://10.100.14.102:8761
          predicates:
            - Path=/eureka/web
          filters:
            - SetPath=/
        - id: discovery-service-static
          uri: http://10.100.14.102:8761
          predicates:
            - Path=/eureka/**
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

eureka:
  client:
    service-url:
      defaultZone: http://10.100.14.102:8761/eureka
  instance:
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,gateway

app:
  jwt:
    secret: ${JWT_SECRET:dGhpcyBpcyBhIHNlY3JldCBrZXkgZm9yIHNpZ3JlLXdlYiBlcnAgand0IHRva2VuIHNpZ25pbmc=}

logging:
  level:
    root: info
    org.springframework.cloud.gateway: trace
    org.springframework.cloud.gateway.route.RouteDefinitionRouteLocator: info

---
# Perfil para Docker
spring:
  config:
    activate:
      on-profile: docker

eureka:
  client:
    service-url:
      defaultZone: http://discovery-server:8761/eureka
