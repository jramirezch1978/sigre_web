spring:
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        default_schema: compras
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: false

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

  mail:
    host: localhost
    port: 2525

app:
  security-datasource:
    jdbc-url: jdbc:postgresql://${DB_HOST:db-pv-pod1-dev.contabilidad.sigre.web}:${DB_PORT:5433}/${DB_SECURITY_NAME:sigre_security}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:Erp_restpe#2026}
  tenant:
    db-host-override: ${DB_HOST:db-pv-pod1-dev.contabilidad.sigre.web}
    db-port-override: ${DB_PORT:5433}
    jdbc-ssl-mode: ${DB_SSL_MODE:disable}
    pool:
      maximum-pool-size: 3
      minimum-idle: 0
      idle-timeout-ms: 30000
      max-lifetime-ms: 120000
  jwt:
    secret: dGhpcyBpcyBhIHNlY3JldCBrZXkgZm9yIHJlc3RhdXJhbnQucGUgZXJwIGp3dCB0b2tlbiBzaWduaW5n
    access-token-expiration: 900000
    definitive-token-expiration: 900000
    refresh-token-expiration: 604800000
  encryption:
    key: UmVzdGF1cmFudFBlQWVzMjU2S2V5RGV2MjAyNiEhISE=

logging:
  level:
    com.sigre.compras: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

testcontainers:
  reuse:
    enable: true
