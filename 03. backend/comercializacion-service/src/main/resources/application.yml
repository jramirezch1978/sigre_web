server:
  port: 9010
spring:
  application:
    name: comercializacion-service
  sql:
    init:
      mode: never
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        default_schema: ventas
        dialect: org.hibernate.dialect.PostgreSQLDialect
        boot:
          allow_jdbc_metadata_access: false
        # Optimizations for PostgreSQL performance and batch operations
        jdbc:
          batch_size: 20
          order_inserts: true
          order_updates: true
        query:
          plan_cache_max_size: 4096
  flyway:
    enabled: false
  rabbitmq:
    host: ${RABBIT_HOST:localhost}
    port: ${RABBIT_PORT:5672}
    username: ${RABBIT_USER:sigre}
    password: ${RABBIT_PASS:sigre}
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  health:
    db:
      enabled: false
app:
  testdata:
    enabled: ${APP_TESTDATA_ENABLED:true}
  security-datasource:
    jdbc-url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_SECURITY_NAME:sigre_security}?sslmode=${DB_SSL_MODE:disable}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:jarch32b}
  tenant:
    jdbc-ssl-mode: ${DB_SSL_MODE:disable}
    pool:
      maximum-pool-size: ${TENANT_POOL_MAX:3}
      minimum-idle: ${TENANT_POOL_MIN_IDLE:0}
      idle-timeout-ms: ${TENANT_POOL_IDLE_TIMEOUT:30000}
      max-lifetime-ms: ${TENANT_POOL_MAX_LIFETIME:120000}
  jwt:
    secret: ${JWT_SECRET:dGhpcyBpcyBhIHNlY3JldCBrZXkgZm9yIHNpZ3JlLXdlYiBlcnAgand0IHRva2VuIHNpZ25pbmc=}
    access-token-expiration: ${JWT_ACCESS_MS:900000}
    definitive-token-expiration: ${JWT_DEFINITIVE_MS:900000}
    refresh-token-expiration: ${JWT_REFRESH_MS:604800000}
  encryption:
    key: ${APP_ENCRYPTION_KEY:U2lncmVFcnBXZWJBZXMyNTZLZXlEZXYyMDI2ISEhISE=}

# ConfiguraciÃ³n para comunicaciÃ³n con otros microservicios
api:
  gateway:
    url: ${API_GATEWAY_URL:http://api-gateway:9080}

feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 10000
        loggerLevel: basic
      almacen-service:
        url: ${MS_ALMACEN_URL:http://almacen-service:9003}

springdoc:
  api-docs:
    path: /api/ventas/v3/api-docs
  swagger-ui:
    path: /api/ventas/swagger-ui.html
---
spring:
  config:
    activate:
      on-profile: docker

eureka:
  client:
    service-url:
      defaultZone: http://discovery-server:8761/eureka
  instance:
    prefer-ip-address: true