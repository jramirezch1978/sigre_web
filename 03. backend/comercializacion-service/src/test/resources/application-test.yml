# Perfil test para comercializacion-service — conexión a BD PostgreSQL de desarrollo
# Patrón tomado de finanzas-service: no modifica esquema, no ejecuta Flyway,
# usa la BD de dev con @Transactional para rollback automático.

spring:
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: false

app:
  testdata:
    enabled: true
  security-datasource:
    jdbc-url: jdbc:postgresql://db-pv-pod1-dev.contabilidad.sigre.pe:5433/sigre_security
    username: postgres
    password: Erp_restpe#2026
  tenant:
    db-host-override: db-pv-pod1-dev.contabilidad.sigre.pe
    db-port-override: 5433
    jdbc-ssl-mode: disable
    pool:
      maximum-pool-size: 3
      minimum-idle: 0
      idle-timeout-ms: 30000
      max-lifetime-ms: 120000
  jwt:
    secret: 5x0t3h4sh4v32048b1ts3cur3k3yf0rt3st1ngpurp0s3sonlynd0tpr0duct10n
    access-token-expiration: 3600000
    definitive-token-expiration: 3600000
    refresh-token-expiration: 86400000

# Feign clients: URLs dummy (se mockean con @MockBean en tests de integración)
feign:
  client:
    config:
      contabilidad-service:
        url: http://localhost:9999
      almacen-service:
        url: http://localhost:9999

logging:
  level:
    com.sigre.comercializacion: DEBUG
    org.springframework.web: DEBUG
