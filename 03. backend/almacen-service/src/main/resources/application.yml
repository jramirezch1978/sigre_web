server:
  port: 9003
spring:
  application:
    name: almacen-service
  sql:
    init:
      mode: never
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        default_schema: almacen
        dialect: org.hibernate.dialect.PostgreSQLDialect
        boot:
          allow_jdbc_metadata_access: false
  flyway:
    enabled: false
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  health:
    db:
      enabled: false
app:
  almacen:
    integracion:
      validar-tres-vias: ${ALMACEN_VALIDAR_TRES_VIAS:true}
      tolerancia-tres-vias: ${ALMACEN_TOLERANCIA_TRES_VIAS:0.0001}
  testdata:
    enabled: ${APP_TESTDATA_ENABLED:false}
  security-datasource:
    jdbc-url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_SECURITY_NAME:sigre_security}?sslmode=${DB_SSL_MODE:disable}
    username: ${DB_USER:postgres}
    password: "${DB_PASS:${POSTGRES_PASSWORD:jarch32b}}"
  tenant:
    jdbc-ssl-mode: ${DB_SSL_MODE:disable}
    pool:
      maximum-pool-size: ${TENANT_POOL_MAX:3}
      minimum-idle: ${TENANT_POOL_MIN_IDLE:0}
      idle-timeout-ms: ${TENANT_POOL_IDLE_TIMEOUT:30000}
      max-lifetime-ms: ${TENANT_POOL_MAX_LIFETIME:120000}
  jwt:
    secret: ${JWT_SECRET:dGhpcyBpcyBhIHNlY3JldCBrZXkgZm9yIHNpZ3JlLXdlYiBlcnAgand0IHRva2VuIHNpZ25pbmc=}
    access-token-expiration: ${JWT_ACCESS_MS:900000}
    definitive-token-expiration: ${JWT_DEFINITIVE_MS:900000}
    refresh-token-expiration: ${JWT_REFRESH_MS:604800000}
  encryption:
    key: ${APP_ENCRYPTION_KEY:U2lncmVFcnBXZWJBZXMyNTZLZXlEZXYyMDI2ISEhISE=}
api:
  gateway:
    url: ${API_GATEWAY_URL:http://api-gateway:9080}
client:
  contabilidad-service:
    url: ${CLIENT_CONTABILIDAD_URL:${api.gateway.url}}
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 10000
        loggerLevel: basic
  compression:
    request:
      enabled: true
    response:
      enabled: true
springdoc:
  api-docs:
    path: /api/almacen/v3/api-docs
  swagger-ui:
    path: /api/almacen/swagger-ui.html

---
spring:
  config:
    activate:
      on-profile: docker

eureka:
  client:
    service-url:
      defaultZone: http://discovery-server:8761/eureka
  instance:
    prefer-ip-address: true
