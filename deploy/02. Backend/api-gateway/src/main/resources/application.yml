server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # ── Autenticación ──
        # RequestRateLimiter deshabilitado: requiere KeyResolver bean (pendiente)
        # Cuando se habilite, agregar @Bean KeyResolver en la config Java
        - id: ms-auth-security
          uri: ${MS_AUTH_URI:http://ms-auth-security:9001}
          predicates:
            - Path=/api/auth/**

        # ── Admin ms-auth (provision tenant, etc.) ──
        - id: ms-auth-admin
          uri: ${MS_AUTH_URI:http://ms-auth-security:9001}
          predicates:
            - Path=/api/admin/**

        # ── Internal ms-auth (tenant connection) ──
        - id: ms-auth-internal
          uri: ${MS_AUTH_URI:http://ms-auth-security:9001}
          predicates:
            - Path=/api/internal/tenants/**

        # ── Maestros ──
        - id: ms-core-maestros
          uri: ${MS_CORE_URI:http://ms-core-maestros:9002}
          predicates:
            - Path=/api/core/**

        # ── Almacén ──
        - id: ms-almacen
          uri: ${MS_ALMACEN_URI:http://ms-almacen:9003}
          predicates:
            - Path=/api/almacen/**

        # ── Compras ──
        - id: ms-compras
          uri: ${MS_COMPRAS_URI:http://ms-compras:9004}
          predicates:
            - Path=/api/compras/**

        # ── Finanzas ──
        - id: ms-finanzas
          uri: ${MS_FINANZAS_URI:http://ms-finanzas:9005}
          predicates:
            - Path=/api/finanzas/**

        # ── Contabilidad ──
        - id: ms-contabilidad
          uri: ${MS_CONTABILIDAD_URI:http://ms-contabilidad:9006}
          predicates:
            - Path=/api/contabilidad/**

        # ── RRHH ──
        - id: ms-rrhh
          uri: ${MS_RRHH_URI:http://ms-rrhh:9007}
          predicates:
            - Path=/api/rrhh/**

        # ── Activos Fijos ──
        - id: ms-activos-fijos
          uri: ${MS_ACTIVOS_URI:http://ms-activos-fijos:9008}
          predicates:
            - Path=/api/activos/**

        # ── Producción ──
        - id: ms-produccion
          uri: ${MS_PRODUCCION_URI:http://ms-produccion:9009}
          predicates:
            - Path=/api/produccion/**

        # ── Ventas ──
        - id: ms-ventas
          uri: ${MS_VENTAS_URI:http://ms-ventas:9010}
          predicates:
            - Path=/api/ventas/**

        # ── Auditoría ──
        - id: ms-auditoria
          uri: ${MS_AUDITORIA_URI:http://ms-auditoria:9011}
          predicates:
            - Path=/api/auditoria/**

        # ── Reportes ──
        - id: ms-reportes
          uri: ${MS_REPORTES_URI:http://ms-reportes:9012}
          predicates:
            - Path=/api/reportes/**

        # ── Notificaciones ──
        - id: ms-notificaciones
          uri: ${MS_NOTIFICACIONES_URI:http://ms-notificaciones:9013}
          predicates:
            - Path=/api/notificaciones/**

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:R3d1s_D3v!}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,gateway

app:
  jwt:
    secret: ${JWT_SECRET:dGhpcyBpcyBhIHNlY3JldCBrZXkgZm9yIHJlc3RhdXJhbnQucGUgZXJwIGp3dCB0b2tlbiBzaWduaW5n}
