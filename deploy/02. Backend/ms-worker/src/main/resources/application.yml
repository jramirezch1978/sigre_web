server:
  port: 9014
spring:
  application:
    name: ms-worker
  config:
    import: optional:configserver:${CONFIG_SERVER_URI:http://localhost:8888}
  cloud:
    config:
      username: ${CONFIG_SERVER_USER:config_user}
      password: ${CONFIG_SERVER_PASSWORD:config_pass}
      fail-fast: false
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:restaurant_pe_security}
    username: ${DB_USER:restaurant_admin}
    password: ${DB_PASS:R3st4ur4nt_D3v!}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public
  flyway:
    enabled: false
  rabbitmq:
    host: ${RABBIT_HOST:localhost}
    port: ${RABBIT_PORT:5672}
    username: ${RABBIT_USER:restaurant}
    password: ${RABBIT_PASS:R4bb1t_D3v!}
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
app:
  jwt:
    secret: ${JWT_SECRET:dGhpcyBpcyBhIHNlY3JldCBrZXkgZm9yIHJlc3RhdXJhbnQucGUgZXJwIGp3dCB0b2tlbiBzaWduaW5n}
  encryption:
    key: ${APP_ENCRYPTION_KEY:UmVzdGF1cmFudFBlQWVzMjU2S2V5RGV2MjAyNiEhISE=}
  schema-sync:
    admin-secret: ${SCHEMA_SYNC_ADMIN_SECRET:dev-schema-sync}
    template-database: ${SCHEMA_SYNC_TEMPLATE_DB:restaurant_pe_template}
    concurrency: ${SCHEMA_SYNC_CONCURRENCY:3}
    pool:
      max-size: ${SCHEMA_SYNC_POOL_MAX_SIZE:2}
      min-idle: ${SCHEMA_SYNC_POOL_MIN_IDLE:0}
      idle-timeout-ms: ${SCHEMA_SYNC_POOL_IDLE_TIMEOUT:60000}
      connection-timeout-ms: ${SCHEMA_SYNC_POOL_CONN_TIMEOUT:10000}
    schedule:
      enabled: ${SCHEMA_SYNC_SCHEDULE_ENABLED:false}
      interval-minutes: ${SCHEMA_SYNC_INTERVAL_MINUTES}
      dry-run: ${SCHEMA_SYNC_SCHEDULE_DRY_RUN:false}
    data-sync:
      enabled: ${SCHEMA_SYNC_DATA_ENABLED:false}
      tables: ${SCHEMA_SYNC_DATA_TABLES:}
  activos-jobs:
    enabled: ${ACTIVOS_JOBS_ENABLED:false}
    base-url: ${ACTIVOS_JOBS_BASE_URL:http://localhost:9008}
    bearer-token: ${ACTIVOS_JOBS_BEARER_TOKEN:}
    empresa-id: ${ACTIVOS_JOBS_EMPRESA_ID:}
    db-name: ${ACTIVOS_JOBS_DB_NAME:}
    contabilizar: ${ACTIVOS_JOBS_CONTABILIZAR:true}
    depreciacion-cron: ${ACTIVOS_JOBS_DEPRECIACION_CRON:0 0 2 1 * ?}
    devengo-cron: ${ACTIVOS_JOBS_DEVENGO_CRON:0 0 3 1 * ?}
springdoc:
  api-docs:
    path: /api/worker/v3/api-docs
  swagger-ui:
    path: /api/worker/swagger-ui.html
