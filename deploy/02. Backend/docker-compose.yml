# ============================================================
# Restaurant.pe ERP — Docker Compose (DESARROLLO LOCAL)
# ============================================================
#
# IMPORTANTE: Este archivo es para DESARROLLO LOCAL únicamente.
# Para ambientes desplegados (dev server, staging, prod), la
# distribución de recursos se gestiona desde Terraform:
#
#   cd "04. Terraform"
#   terraform apply -var-file="environments/dev.tfvars"
#
# Terraform genera docker-compose.generated.yml con los
# resource limits correctos para el servidor destino.
#
# NOTA: Este servidor es de DESARROLLO + PRUEBAS.
#
# Uso local:
#   docker-compose up -d                         # Todo (servicios base)
#   docker-compose up -d postgres rabbitmq redis  # Solo infra
#   docker-compose --profile observability up -d  # + Monitoring
#   docker-compose --profile testing up -d        # + SonarQube + Selenium
#   docker-compose --profile iac up -d            # + Terraform
#
# Testing:
#   docker-compose --profile testing up -d        # SonarQube + Selenium Grid
#   Acceso SonarQube: http://localhost:9000 (admin/admin)
#   Acceso Selenium Grid: http://localhost:4444
#
# Terraform como contenedor:
#   docker-compose --profile iac run terraform init
#   docker-compose --profile iac run terraform plan dev
#   docker-compose --profile iac run terraform apply dev
#   docker-compose --profile iac exec terraform shell
# ============================================================

services:

  # ── Infraestructura ────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: rpe-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: restaurant_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-R3st4ur4nt_D3v!}
      POSTGRES_DB: restaurant_pe_security
      TZ: America/Lima
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/01-init-security.sql:/docker-entrypoint-initdb.d/01-init-security.sql:ro
      - ./scripts/02-init-empresa.sql:/docker-entrypoint-initdb.d/02-init-empresa.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U restaurant_admin -d restaurant_pe_security"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - rpe-network

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rpe-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBIT_USER:-restaurant}
      RABBITMQ_DEFAULT_PASS: ${RABBIT_PASS:-R4bb1t_D3v!}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - rpe-network

  redis:
    image: redis:7-alpine
    container_name: rpe-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASS:-R3d1s_D3v!}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASS:-R3d1s_D3v!}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rpe-network

  # ── Observabilidad (perfil separado) ───────────────────────

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.16.1
    container_name: rpe-elasticsearch
    restart: unless-stopped
    profiles: ["observability"]
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - rpe-network

  kibana:
    image: docker.elastic.co/kibana/kibana:8.16.1
    container_name: rpe-kibana
    restart: unless-stopped
    profiles: ["observability"]
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - rpe-network

  prometheus:
    image: prom/prometheus:latest
    container_name: rpe-prometheus
    restart: unless-stopped
    profiles: ["observability"]
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - rpe-network

  grafana:
    image: grafana/grafana:latest
    container_name: rpe-grafana
    restart: unless-stopped
    profiles: ["observability"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASS:-admin}
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - rpe-network

  zipkin:
    image: openzipkin/zipkin:latest
    container_name: rpe-zipkin
    restart: unless-stopped
    profiles: ["observability"]
    ports:
      - "9411:9411"
    networks:
      - rpe-network

  # ── Terraform Runner (perfil: iac) ─────────────────────────

  terraform:
    build:
      context: ../04. Terraform
      dockerfile: Dockerfile
    container_name: rpe-terraform
    profiles: ["iac"]
    stdin_open: true
    tty: true
    working_dir: /workspace
    volumes:
      # Configuración de Terraform
      - ../04. Terraform:/workspace
      # Persistir plugins descargados (no re-descargar cada vez)
      - terraform_plugins:/workspace/.terraform
      - terraform_plugin_cache:/workspace/.terraform-plugin-cache
      # Credenciales GCP (crear carpeta local con gcp-key.json)
      - ../04. Terraform/credentials:/credentials:ro
      # Docker socket para que Terraform pueda gestionar contenedores si es necesario
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      TF_VAR_db_admin_password: ${DB_PASSWORD:-R3st4ur4nt_D3v!}
      TF_VAR_rabbitmq_pass: ${RABBIT_PASS:-R4bb1t_D3v!}
      TF_VAR_grafana_password: ${GRAFANA_PASS:-admin}
      GOOGLE_APPLICATION_CREDENTIALS: /credentials/gcp-key.json
    entrypoint: ["/usr/local/bin/entrypoint.sh"]
    command: ["shell"]
    networks:
      - rpe-network

  # ── Testing (perfil separado) ──────────────────────────────

  sonarqube:
    image: sonarqube:10-community
    container_name: rpe-sonarqube
    restart: unless-stopped
    profiles: ["testing"]
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://postgres:5432/sonarqube
      SONAR_JDBC_USERNAME: restaurant_admin
      SONAR_JDBC_PASSWORD: ${DB_PASSWORD:-R3st4ur4nt_D3v!}
      SONAR_SEARCH_JAVAADDITIONALOPTS: "-Dnode.store.allow_mmap=false"
    ports:
      - "9000:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - rpe-network

  selenium-hub:
    image: selenium/hub:4-latest
    container_name: rpe-selenium-hub
    restart: unless-stopped
    profiles: ["testing"]
    ports:
      - "4442:4442"
      - "4443:4443"
      - "4444:4444"
    networks:
      - rpe-network

  selenium-chrome:
    image: selenium/node-chrome:4-latest
    container_name: rpe-selenium-chrome
    restart: unless-stopped
    profiles: ["testing"]
    environment:
      SE_EVENT_BUS_HOST: selenium-hub
      SE_EVENT_BUS_PUBLISH_PORT: 4442
      SE_EVENT_BUS_SUBSCRIBE_PORT: 4443
      SE_NODE_MAX_SESSIONS: 2
    depends_on:
      - selenium-hub
    shm_size: '256m'
    networks:
      - rpe-network

  # ── Servicios de infraestructura ───────────────────────────

  eureka-server:
    build: ./eureka-server
    container_name: rpe-eureka-server
    restart: unless-stopped
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - rpe-network

  config-server:
    build: ./config-server
    container_name: rpe-config-server
    restart: unless-stopped
    ports:
      - "8888:8888"
    depends_on:
      eureka-server:
        condition: service_healthy
    environment:
      EUREKA_URI: http://eureka-server:8761/eureka
    networks:
      - rpe-network

  api-gateway:
    build: ./api-gateway
    container_name: rpe-api-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      eureka-server:
        condition: service_healthy
    environment:
      EUREKA_URI: http://eureka-server:8761/eureka
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASS:-R3d1s_D3v!}
    networks:
      - rpe-network

