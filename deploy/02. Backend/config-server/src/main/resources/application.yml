server:
  port: 8888

spring:
  application:
    name: config-server
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:git}
  cloud:
    config:
      server:
        git:
          uri: ${CONFIG_REPO_URI:https://gitlab.com/desarrollo-restpe/restpe-contabilidad-config-server.git}
          default-label: ${CONFIG_REPO_BRANCH:main}
          search-paths: config-repo,config-repo/{profile}
          clone-on-start: true
          force-pull: true
          timeout: 10
          username: ${CONFIG_REPO_USERNAME:}
          password: ${CONFIG_REPO_PASSWORD:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

logging:
  level:
    org.springframework.cloud.config: INFO
