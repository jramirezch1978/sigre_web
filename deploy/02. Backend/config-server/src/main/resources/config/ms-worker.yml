app:
  schema-sync:
    schedule:
      enabled: true
      interval-minutes: 5
      dry-run: false
    data-sync:
      enabled: true
      # Orden alineado a config-repo: auth.usuario; luego moneda/auth.sucursal antes de almacen;
      # grupo_matriz_cntbl -> matriz_cntbl_finan -> tipo_mov_matriz_subcat.
      tables: >
        auth.usuario,
        core.articulo_categ,
        core.articulo_clase,
        core.articulo_sub_categ,
        core.tipos_impuesto,
        core.calendario_feriado,
        core.pais,
        core.departamento,
        core.provincia,
        core.distrito,
        core.conversion_unidad,
        core.forma_pago,
        core.motivo_nota,
        core.doc_tipo,
        core.unidad_medida,
        core.color,
        core.moneda,
        core.tipo_cambio,
        auth.sucursal,
        almacen.articulo_mov_tipo,
        almacen.motivo_traslado,
        almacen.almacen_tipo,
        almacen.almacen,
        almacen.almacen_tipo_mov,
        contabilidad.grupo_contable,
        contabilidad.cntbl_libro,
        contabilidad.grupo_matriz_cntbl,
        contabilidad.matriz_cntbl_finan,
        contabilidad.tipo_mov_matriz_subcat,
        contabilidad.cencos_niv1,
        contabilidad.cencos_niv2,
        contabilidad.cencos_niv3,
        contabilidad.centros_costo,
        core.catalogo_sunat,
        core.catalogo_sunat_det,
        core.sunat_cubso,
        core.detr_bien_serv,
        rrhh.admin_afp
    template-database: restaurant_pe_template
    concurrency: 3
    pool:
      max-size: 2
      min-idle: 0
      idle-timeout-ms: 60000
      connection-timeout-ms: 10000
