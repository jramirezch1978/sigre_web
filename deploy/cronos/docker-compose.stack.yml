# SIGRE ERP — Stack de infraestructura (cronos)
# Generado por Terraform — regenerar con:
#   cd "05. Terraform"
#   terraform apply -var-file=environments/cronos.tfvars -var-file=secrets.tfvars

name: sigre-stack

services:
  postgres:
    container_name: postgres17
    image: postgres:17
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.utf8"
      TZ: America/Lima
      PGTZ: America/Lima
    command:
      - postgres
      - -c
      - timezone=America/Lima
      - -c
      - shared_buffers=768MB
      - -c
      - effective_cache_size=2048MB
      - -c
      - work_mem=16MB
      - -c
      - maintenance_work_mem=128MB
      - -c
      - wal_buffers=16MB
      - -c
      - max_connections=100
      - -c
      - max_parallel_workers=2
      - -c
      - max_parallel_workers_per_gather=1
      - -c
      - max_parallel_maintenance_workers=1
      - -c
      - random_page_cost=1.1
      - -c
      - effective_io_concurrency=200
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - autovacuum_vacuum_scale_factor=0.05
      - -c
      - log_min_duration_statement=500
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
    mem_limit: 3g
    shm_size: 256mb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
        compress: "true"

  rabbitmq:
    container_name: rabbitmq
    image: rabbitmq:3.13-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: sigre
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-sigre}
      TZ: America/Lima
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    mem_limit: 384m
    shm_size: 128mb
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    logging:
      driver: json-file
      options:
        max-size: "30m"
        max-file: "3"
        compress: "true"

  db-sigre-web:
    container_name: db-sigre-web
    image: postgres:17
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: db-sigre-web
      POSTGRES_USER: sigre-web
      POSTGRES_PASSWORD: ${ASISTENCIA_DB_PASSWORD:-S1greW3b@2025!}
      TZ: America/Lima
      PGTZ: America/Lima
    command:
      - postgres
      - -c
      - timezone=America/Lima
    volumes:
      - db_sigre_web_data:/var/lib/postgresql/data
    mem_limit: 384m
    shm_size: 128mb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sigre-web -d db-sigre-web"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
        compress: "true"

  sonarqube:
    profiles: ["tools"]
    container_name: sonarqube
    image: sonarqube:community
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "9001:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://postgres:5432/sonarqube
      SONAR_JDBC_USERNAME: sonarqube
      SONAR_JDBC_PASSWORD: ${SONAR_DB_PASSWORD}
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
      TZ: America/Lima
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    mem_limit: 3g
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/api/system/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
        compress: "true"

volumes:
  postgres_data:
    driver: local
  rabbitmq_data:
    driver: local
  db_sigre_web_data:
    driver: local
  sonarqube_data:
    driver: local
  sonarqube_extensions:
    driver: local
  sonarqube_logs:
    driver: local

networks:
  default:
    name: stack_default
    external: true
