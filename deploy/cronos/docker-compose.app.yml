# SIGRE ERP — Aplicación (frontend + backend Fase 1)
# Red externa stack_default — PostgreSQL por hostname: postgres
# NO compilar en cronos: docker compose pull && up -d

name: sigre-app

services:
  discovery-server:
    container_name: discovery-server
    image: ${IMAGE_REGISTRY}/discovery-server:${IMAGE_TAG}
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      TZ: America/Lima
      JAVA_OPTS: "-Xms128m -Xmx384m -Duser.timezone=America/Lima"
    mem_limit: 512m
    networks:
      - stack_default
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
        compress: "true"

  api-gateway:
    container_name: api-gateway
    image: ${IMAGE_REGISTRY}/api-gateway:${IMAGE_TAG}
    restart: unless-stopped
    ports:
      - "9080:9080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      TZ: America/Lima
      SERVER_PORT: "9080"
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-server:8761/eureka
      MS_AUTH_URI: http://seguridad-service:9001
      JWT_SECRET: ${JWT_SECRET:-dGhpcyBpcyBhIHNlY3JldCBrZXkgZm9yIHNpZ3JlLXdlYiBlcnAgand0IHRva2VuIHNpZ25pbmc=}
      JAVA_OPTS: "-Xms192m -Xmx384m -Duser.timezone=America/Lima"
    mem_limit: 512m
    networks:
      - stack_default
    depends_on:
      discovery-server:
        condition: service_healthy
      seguridad-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
        compress: "true"

  asistencia-service:
    container_name: asistencia-service
    image: ${IMAGE_REGISTRY}/asistencia-service:${IMAGE_TAG}
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      TZ: America/Lima
      SERVER_PORT: "8084"
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-server:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/sigre_emp_cantabria
      SPRING_DATASOURCE_USERNAME: erp_app
      SPRING_DATASOURCE_PASSWORD: ${ERP_APP_PASSWORD}
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "5"
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: "2"
      JAVA_OPTS: "-Xms192m -Xmx384m -Duser.timezone=America/Lima"
    mem_limit: 512m
    networks:
      - stack_default
    depends_on:
      discovery-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/api/time/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
        compress: "true"

  seguridad-service:
    container_name: seguridad-service
    image: ${IMAGE_REGISTRY}/seguridad-service:${IMAGE_TAG}
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      TZ: America/Lima
      SERVER_PORT: "9001"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: sigre_security
      DB_USER: postgres
      DB_PASS: ${POSTGRES_PASSWORD}
      DB_SSL_MODE: disable
      TENANT_TEMPLATE_DB: sigre_template
      JWT_SECRET: ${JWT_SECRET:-dGhpcyBpcyBhIHNlY3JldCBrZXkgZm9yIHNpZ3JlLXdlYiBlcnAgand0IHRva2VuIHNpZ25pbmc=}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:-U2lncmVFcnBXZWJBZXMyNTZLZXlEZXYyMDI2ISEhISE=}
      APP_PROVISION_SECRET: ${APP_PROVISION_SECRET:-dev-provision-cambiar-produccion}
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-server:8761/eureka
      JAVA_OPTS: "-Xms192m -Xmx512m -Duser.timezone=America/Lima"
    mem_limit: 768m
    networks:
      - stack_default
    depends_on:
      discovery-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9001/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
        compress: "true"

  almacen-service:
