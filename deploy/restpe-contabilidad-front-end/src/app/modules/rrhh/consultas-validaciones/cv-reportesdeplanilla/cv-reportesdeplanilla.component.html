<div class="contenedor-principal" [appLoader]="isLoading()">
  <div class="panel-izquierdo">
    <div class="cont-title">
      <span>Netos a pagar y saldos (Selecciona un trabajador y su monto neto de tu lista para visualizarlo)</span>
    </div>

    <div class="contenedor-filtros">
      <div class="filtros-responsive">
        <div class="buscador">
          <fa-icon [icon]="farSearch"></fa-icon>
          <ion-input fill="outline" placeholder="Buscar por nombre o número de documento" class="w-full"
            style="--padding-start:30px"></ion-input>
        </div>
      </div>
      <div class="filtros-absolutos">
        <app-base-calendar-new class="flex-none" mode="range" [initialStartDate]="startDate"
            [initialEndDate]="endDate" [minDate]="minDate" [maxDate]="maxDate" position="right"
            (dateRangeSelected)="filtrarPorFechas($event)">
          </app-base-calendar-new>

        <ion-button fill="outline" class="w-[115px] flex-none text-text-85" id="reportesplanilla">
          <fa-icon [icon]="fasDownload" class="mr-1"></fa-icon>
          <span>Exportar</span>
          <fa-icon class="ml-1" [icon]="fasAngleDown"></fa-icon>
        </ion-button>
        <ion-popover trigger="reportesplanilla" triggerAction="click" [dismissOnSelect]="true"
          class="popoverCustomButtonUbicacionActivos dezplegableAcciones2" [showBackdrop]="false">
          <ng-template>
            <ion-item lines="none" [button]="true" [detail]="false">Exportar Excel</ion-item>
            <ion-item lines="none" [button]="true" [detail]="false">Exportar PDF</ion-item>
          </ng-template>
        </ion-popover>
      </div>
    </div>
    <div class="h-full relative">
      <fa-icon [icon]="fasRotateRight" (click)="onBtReset()" class="btn-refresh"></fa-icon>
      <ag-grid-angular style="width: 100%; height: 100%;" class="" [rowData]="rowData" [columnDefs]="colDefs"
        [columnTypes]="columnTypes" [pagination]="true" [rowHeight]="20" [localeText]="localeText" [headerHeight]="24"
        [paginationPageSize]="20" (gridReady)="onGridReady($event)" 
        (rowClicked)="onRowClicked($event)" />
    </div>
  </div>
</div>
