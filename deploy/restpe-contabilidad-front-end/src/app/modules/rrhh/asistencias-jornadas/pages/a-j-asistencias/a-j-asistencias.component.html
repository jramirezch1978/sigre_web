<div class="contenedor-principal">
  <div class="panel-izquierdo">
    <div class="cont-title">
      <span>Lista de asistencias (Selecciona una asistencia para visualizarlo o editarlo)</span>
    </div>
    <div class="contenedor-filtros">
      <div class="filtros-responsive">
        <div class="buscador">
          <fa-icon [icon]="farSearch"></fa-icon>
          <ion-input fill="outline" placeholder="Buscar " class="w-full"
            style="--padding-start:30px"></ion-input>
        </div>
      </div>
      <div class="filtros-absolutos">
        <ion-button class="w-[115px] text-text-85" fill="outline" id="listaasistencias">
          <fa-icon [icon]="fasDownload" class="mr-1"></fa-icon>
          <span>Exportar</span>
          <fa-icon class="ml-1" [icon]="fasAngleDown"></fa-icon>
        </ion-button>
        <ion-popover trigger="listaasistencias" triggerAction="click" [dismissOnSelect]="true"
          class="popoverCustomButtonUbicacionActivos" [showBackdrop]="false">
          <ng-template>
            <ion-item lines="none" [button]="true" [detail]="false">Exportar Excel</ion-item>
            <ion-item lines="none" [button]="true" [detail]="false">Exportar PDF</ion-item>
          </ng-template>
        </ion-popover>
        <ion-button class="w-fit" (click)="onBtReset()"><fa-icon [icon]="fasRefresh"
            class="mr-1"></fa-icon> <span class="font-normal">Sincronizar</span></ion-button>
      </div>
    </div>
    <div class="flex h-full relative" [appLoader]="isLoading()">
      <fa-icon [icon]="fasRotateRight" (click)="onBtReset()" class="btn-refresh"></fa-icon>
      <ag-grid-angular style="width: 100%; height: 100%;" class="" [suppressLoadingOverlay]="true" [rowData]="rowData" [columnDefs]="colDefs"
        [columnTypes]="columnTypes" [pagination]="true" [localeText]="localeText"
        [rowHeight]="20" [purgeClosedRowNodes]="true" [headerHeight]="34" [paginationPageSize]="20"
        (gridReady)="onGridReady($event)"/>
    </div>
  </div>
</div>
