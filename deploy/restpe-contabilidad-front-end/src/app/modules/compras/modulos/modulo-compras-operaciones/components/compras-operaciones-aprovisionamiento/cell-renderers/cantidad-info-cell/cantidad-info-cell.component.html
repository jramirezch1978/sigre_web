<div class="flex flex-row z-40 items-center gap-1 cursor-pointer">
  <app-tooltip 
    *ngIf="showInfo"
    text="Has ingresado una cantidad menor a la sugerida."
    icon="info-circle"
    color="text-warning"
    iconPrefix="far"
    position="top"
    width="200px">
  </app-tooltip>
  <span>{{ value }}</span>
</div>
