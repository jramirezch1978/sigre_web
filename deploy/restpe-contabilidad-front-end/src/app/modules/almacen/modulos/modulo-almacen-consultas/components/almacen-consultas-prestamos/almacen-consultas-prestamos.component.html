<div class="contenedor-principal">
  <div class="panel-izquierdo">
    <div class="cont-title">
      <span>Consulta de mercadería entregada temporalmente</span>
    </div>

    <!-- Filtros -->
    <div class="contenedor-filtros">
      <div class="filtros-responsive">
          <div class="relative w-full">
            <fa-icon [icon]="farSearch"
              class=" absolute left-2.5 top-1.5 text-xxs text-[#878787] z-40"></fa-icon>
            <ion-input fill="outline" placeholder="Buscar por código, producto, categoría, usuario responsable"
              class="w-full" style="--padding-start:30px"></ion-input>
        </div>
      </div>
      <!-- calendario -->
      <app-base-calendar-new class="flex-none" mode="range" [initialStartDate]="startDate"
        [initialEndDate]="endDate" [minDate]="minDate" [maxDate]="maxDate" position="right"
        (dateRangeSelected)="filtrarPorFechas($event)">
      </app-base-calendar-new>
      <div class="flex items-center gap-3">
        <ion-button fill="outline"  class="w-[115px]" id="consultasprestamos">
          <fa-icon [icon]="fasDownload" class="mr-1 text-text-85"></fa-icon>
          <span>Exportar</span>
          <fa-icon class="ml-1" [icon]="fasAngleDown"></fa-icon>
        </ion-button>
        <ion-popover trigger="consultasprestamos" triggerAction="click" [dismissOnSelect]="true"
          class="popoverCustomButtonUbicacionActivos dezplegableAcciones2" [showBackdrop]="false">
          <ng-template>
            <ion-item lines="none" [button]="true" (click)="exportarExcel()">Exportar Excel</ion-item>
            <ion-item lines="none" [button]="true"  (click)="exportarPdf()">Exportar PDF</ion-item>
          </ng-template>
        </ion-popover>
      </div>
    </div>
    <div class="cont-cards !pt-0">
      <div class="card">
        <div class="contenido">
          <span class="title">Porcentaje de Préstamos Devueltos</span>
          <ion-skeleton-text *ngIf="isLoading()" [animated]="true" style="width: 100%;height: 20px;"></ion-skeleton-text>
          <span *ngIf="!isLoading()" class="cantidad">90%</span>
        </div>
        <div class="icon">
          <fa-icon [icon]="fasCheck" class="text-xs text-primary"></fa-icon>
        </div>
      </div>
      <div class="card">
        <div class="contenido">
          <span class="title">Días promedio de permanencia de préstamo</span>
          <ion-skeleton-text *ngIf="isLoading()" [animated]="true" style="width: 100%;height: 20px;"></ion-skeleton-text>
          <span *ngIf="!isLoading()" class="cantidad">10 días</span>
        </div>
        <div class="icon">
          <fa-icon [icon]="farCalendar" class="text-xs text-primary"></fa-icon>
        </div>
      </div>
      <div class="card">
        <div class="contenido">
          <span class="title">Prestamos pendientes de devolución</span>
          <ion-skeleton-text *ngIf="isLoading()" [animated]="true" style="width: 100%;height: 20px;"></ion-skeleton-text>
          <span *ngIf="!isLoading()" class="cantidad">S/ 999,999.00</span>
        </div>
        <div class="icon">
          <fa-icon [icon]="fasDollar" class="text-xs text-primary"></fa-icon>
        </div>
      </div>

    </div>
    <div class="h-full relative" [appLoader]="isLoading()">
      <fa-icon [icon]="fasRotateRight" (click)="onBtReset()" class="btn-refresh"></fa-icon>
      <ag-grid-angular style="width: 100%; height: 100%;" class="" [rowData]="facade.consultaPrestamos()" [columnDefs]="colDefs"
        [columnTypes]="columnTypes" [pagination]="true" [rowHeight]="20" [headerHeight]="24" [localeText]="localeText"
        [paginationPageSize]="20" [suppressLoadingOverlay]="true" (gridReady)="onGridReady($event)" />
    </div>
  </div>
</div>
