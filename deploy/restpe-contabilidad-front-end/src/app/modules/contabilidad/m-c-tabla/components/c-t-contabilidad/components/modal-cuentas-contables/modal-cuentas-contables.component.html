<div class="flex flex-col gap-1.5 p-1.5 bg-[#E7E7E7] w-[650px]">
  <div class="flex justify-between items-center">
    <div class="flex items-center gap-2">
      <fa-icon [icon]="fasList" class="text-sm text-primary"></fa-icon>
      <span class="text-sm font-bold">Plan de cuentas contables</span>
    </div>
    <fa-icon [icon]="fasXmark" class="text-lg cursor-pointer hover:text-text-60" (click)="cerrarModal(false)"></fa-icon>
  </div>
  <div class="bg-white flex flex-col flex-grow items-center gap-2 p-2.5 ">
    <div class="contenedor-filtros !p-0">
      <div class="buscador">
        <fa-icon [icon]="farSearch"></fa-icon>
        <ion-input fill="outline" placeholder="Buscar por código o descripción" class="w-full" style="--padding-start:30px" [(ngModel)]="busqueda" (ionInput)="onBuscar()"></ion-input>
      </div>
    </div>
    <div class="flex w-full h-[300px] sin-separador">
      <ag-grid-angular 
        style="width: 100%; height: 100%;" 
        class=""
        [rowData]="rowData" 
        [columnDefs]="colDefs" 
        [columnTypes]="columnTypes"
        [localeText]="localeText"
        [defaultColDef]="defaultColDef" 
        [rowSelection]="'single'"
        [autoGroupColumnDef]="autoGroupColumnDef"
        [treeData]="treeData" 
        [getDataPath]="getDataPath" 
        [groupDefaultExpanded]="groupDefaultExpanded" 
        [rowHeight]="20"
        [headerHeight]="24"
        (gridReady)="onGridReady($event)"
        (cellClicked)="onCellClicked($event)"/>
    </div>

    <div class="flex justify-end w-full gap-2 pt-2">
      <ion-button class="w-[68px] text-text-85" fill="outline" color="medium" (click)="cerrarModal(false)">Cancelar</ion-button>
      <ion-button (click)="cerrarModal(true)">Aceptar</ion-button>
    </div>
  </div>
</div>
