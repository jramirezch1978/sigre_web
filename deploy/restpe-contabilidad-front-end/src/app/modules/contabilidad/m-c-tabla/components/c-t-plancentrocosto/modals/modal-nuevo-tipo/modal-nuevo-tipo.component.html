<div class="flex flex-col bg-[#e7e7e7] p-1.5 gap-0.5" style="width: 480px">
  <div class="flex justify-between items-center w-full py-1">
    <div class="flex items-center gap-1">
      <span class="text-sm font-bold">Nuevo tipo de centro de costo</span>
    </div>
    <fa-icon [icon]="farXmark" class="text-sm cursor-pointer" (click)="cerrarModal()"></fa-icon>
  </div>
  <div class="flex flex-col bg-white p-2.5 gap-2">
    <div class="contenido-formulario">
      <span class="label">Nombre de tipo <span class="text-danger">*</span></span>
      <ion-input 
        fill="outline" 
        placeholder="Ingresa un nombre para el tipo" 
        [(ngModel)]="nuevoTipo"
        class="w-full">
      </ion-input>
    </div>

    <div class="flex justify-end flex-row gap-3">
      <ion-button color="medium" fill="outline" class="w-fit" (click)="cerrarModal()">Cancelar</ion-button>
      <ion-button class="w-fit" [disabled]="!nuevoTipo.trim()" (click)="guardar()">Guardar</ion-button>
    </div>
  </div>
</div>
