<div class="contenedor-principal">
  <div class="panel-izquierdo">
    <div class="cont-title">
      <span>Consultar centros de costo (Seleccione al menos un filtro)</span>
    </div>    
    <div class="p-2.5 flex flex-col items-start gap-2.5 w-full">
      <div class="filtros-responsive">
        <div class="grid grid-cols-2 gap-1 w-full">
          <div class="contenido-formulario">
            <span class="label">Periodo contable</span>
            <app-month-year-picker
              class="flex-none w-[170px]"
              [placeholder]="'Selecciona un periodo'"
              (dateSelected)="onPeriodoSeleccionado($event)">
            </app-month-year-picker>
          </div>

          <div class="contenido-formulario">
            <span class="label">Centro de costo</span>
            <app-autocomplete
              [items]="centrosCosto"
              displayKey="nombre"
              valueKey="id"
              placeholder="Selecciona un centro de costo"
              class="w-[230px]"
              (itemSelected)="onCentroCostoSeleccionado($event)">
            </app-autocomplete>
          </div>

          <div class="contenido-formulario">
            <span class="label">Trabajador</span>
            <app-autocomplete
              [items]="trabajadores"
              displayKey="nombre"
              valueKey="id"
              placeholder="Selecciona un trabajador"
              class="w-[230px]"
              (itemSelected)="onTrabajadorSeleccionado($event)">
            </app-autocomplete>
          </div>

          <div class="contenido-formulario">
            <span class="label">Área/Departamento</span>
            <app-autocomplete
              [items]="areasDepartamento"
              displayKey="nombre"
              valueKey="id"
              placeholder="Selecciona un área"
              class="w-[170px]"
              (itemSelected)="onAreaSeleccionada($event)">
            </app-autocomplete>
          </div>

          <div class="contenido-formulario">
            <span class="label">Tipo de movimiento</span>
            <ion-select 
              placeholder="Selecciona un movimiento" 
              interface="popover" 
              fill="outline" 
              class="w-[230px] flex-none" 
              toggleIcon="chevron-down" 
              expandedIcon="chevron-up"
              (ionChange)="onTipoMovimientoSeleccionado($event)">
              <ion-select-option value="gastos">Gastos de planilla</ion-select-option>
              <ion-select-option value="ajustes">Ajustes</ion-select-option>
              <ion-select-option value="asientosmanuales">Asientos manuales</ion-select-option>
              <ion-select-option value="otros">Otros</ion-select-option>
            </ion-select>
          </div>

          <div class="contenido-formulario">
            <span class="label">Moneda</span>
            <ion-select 
              placeholder="Soles" 
              interface="popover" 
              fill="outline" 
              class="w-[170px] flex-none" 
              toggleIcon="chevron-down" 
              expandedIcon="chevron-up"
              (ionChange)="onMonedaSeleccionada($event)">
              <ion-select-option value="soles">Soles</ion-select-option>
              <ion-select-option value="dolares">Dólares</ion-select-option>
            </ion-select>
          </div>

          <div class="contenido-formulario">
            <span class="label">Rango de fechas</span>
            <app-base-calendar-new
              class="flex-none w-[200px]"
              mode="range"
              [placeholder]="'Selecciona un rango'"
              [minDate]="minDate"
              [maxDate]="maxDate"
              position="left"
              (dateRangeSelected)="filtrarPorFechas($event)">
            </app-base-calendar-new>
          </div>

        </div>
      </div>

       <div class="flex items-center gap-3 w-full justify-end">
        <ion-button class="w-[115px]" fill="outline" id="reportec" [disabled]="!botonBuscarHabilitado">
          <fa-icon [icon]="fasDownload" class="mr-1 text-text-85"></fa-icon>
          <span class="text-text-85">Exportar</span>
          <fa-icon class="ml-1 text-text-85" [icon]="fasAngleDown"></fa-icon>
        </ion-button>
        <ion-popover trigger="reportec" triggerAction="click" [dismissOnSelect]="true"
          class="popoverCustomButtonUbicacionActivos" [showBackdrop]="false">
          <ng-template>
            <ion-item lines="none" [button]="true">Exportar Excel</ion-item>
            <ion-item lines="none" [button]="true">Exportar PDF</ion-item>
          </ng-template>
        </ion-popover>
        <ion-button class="w-fit" (click)="buscar()" [disabled]="!botonBuscarHabilitado">
          <span class="font-normal">Buscar</span>
        </ion-button>
      </div>


    </div>
    <div class="cont-title">
      <span>Lista de centros de costo</span>
    </div>
    <!-- Tabla de resultados -->
    <div class="contenedor-primera-tabla" [appLoader]="isLoading()">
      <fa-icon [icon]="fasRotateRight" (click)="onBtReset()" class="btn-refresh"></fa-icon>
      <ag-grid-angular 
        style="width: 100%; height: 100%;" 
        class=""
        [rowData]="rowData" 
        [columnDefs]="colDefs" 
        [columnTypes]="columnTypes"
        [gridOptions]="gridOptions"
        [pagination]="true"
        [localeText]="localeText"
        [rowHeight]="20"
        [headerHeight]="24"
        [paginationPageSize]="20"
        [defaultColDef]="defaultColDef"
        (gridReady)="onGridReady($event)"
        (cellClicked)="onCellClicked($event)"/>
    </div>
  </div>
</div>
