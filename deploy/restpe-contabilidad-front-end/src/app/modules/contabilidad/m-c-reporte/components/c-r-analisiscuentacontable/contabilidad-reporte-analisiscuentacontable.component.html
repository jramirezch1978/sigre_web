<div class="w-full flex flex-col overflow-auto flex-grow h-full">
  <div class="w-full flex-grow flex flex-col h-full">
    <div class="cont-title">
      <span>Análisis de cuenta contable</span>
    </div>
    <div class="contenedor-formulario !gap-2.5">
      <div class="filtros-responsive">
        <div class="form-column2">
          <div class="contenido-formulario">
            <span class="label">Rango de fechas <span class="text-danger">*</span></span>
            <app-base-calendar-new
              class="flex-none w-[220px]"
              mode="range"
              [initialStartDate]="startDate"
              [initialEndDate]="endDate"
              [minDate]="minDate"
              [maxDate]="maxDate"
              position="right"
              (dateRangeSelected)="filtrarPorFechas($event)">
            </app-base-calendar-new>
          </div>

          <div class="contenido-formulario">
            <span class="label">Sucursal</span>
            <app-autocomplete 
              [items]="sucursales" 
              displayKey="nombre" 
              valueKey="id" 
              placeholder="Buscar sucursal" 
              [width]="'w-[220px]'"
              (itemSelected)="onSucursalSeleccionada($event)">
            </app-autocomplete>
          </div>

          <div class="contenido-formulario">
            <span class="label">Cuenta Contable <span class="text-danger">*</span></span>
            <app-autocomplete 
              [items]="cuentasContables" 
              displayKey="nombre" 
              valueKey="id" 
              placeholder="Buscar cuenta contable" 
              [width]="'w-[220px]'"
              (itemSelected)="onCuentaContableSeleccionada($event)">
            </app-autocomplete>
          </div>

          <div class="contenido-formulario">
            <span class="label">Centro de costo</span>
            <app-autocomplete 
              [items]="centrosCosto" 
              displayKey="nombre" 
              valueKey="id" 
              placeholder="Buscar centro de costo" 
              [width]="'w-[220px]'"
              (itemSelected)="onCentroCostoSeleccionado($event)">
            </app-autocomplete>
          </div>
        </div>
      </div>
      <!-- Botones de acción -->
      <div class="flex items-center gap-3 w-full justify-end">
        <ion-button class="w-fit" (click)="generarAnalisis()">
          <span class="font-normal">Generar Análisis</span>
        </ion-button>
      </div>
    </div>

    <div class="flex flex-col w-full h-full overflow-auto">
      <div class="cont-title">
        <span>Información sobre los Asientos Contables</span>
      </div>
      <div class="contenedor-filtros">
        <div class="buscador">
          <fa-icon [icon]="farSearch"></fa-icon>
          <ion-input fill="outline" placeholder="Buscar por código o descripción" class="w-full" style="--padding-start:30px" [disabled]="filasGeneradas.length == 0"></ion-input>
        </div>
        <div class="filtros-absolutos">
          <ion-button class="w-[115px] flex-none" fill="outline" id="exportarBtn" [disabled]="filasGeneradas.length == 0">
            <fa-icon [icon]="fasDownload" class="mr-1 text-text-85"></fa-icon>
            <span class="text-text-85">Exportar</span>
            <fa-icon class="ml-1 text-text-85" [icon]="fasAngleDown"></fa-icon>
          </ion-button>
          <ion-popover trigger="exportarBtn" triggerAction="click" [dismissOnSelect]="true" class="popoverCustomButtonUbicacionActivos dezplegableAcciones2" [showBackdrop]="false">
            <ng-template>
              <ion-item lines="none" [button]="true">Exportar Excel</ion-item>
              <ion-item lines="none" [button]="true">Exportar PDF</ion-item>
            </ng-template>
          </ion-popover>
        </div>
      </div>

      <!-- Tabla de resultados -->
      <div class="contenedor-primera-tabla" [appLoader]="isLoading()">
        <fa-icon [icon]="fasRotateRight" (click)="onBtReset()" class="btn-refresh"></fa-icon>
        <ag-grid-angular 
          style="width: 100%; height: 100%;" 
          class=""
          [rowData]="filasGeneradas" 
          [columnDefs]="columnDefs" 
          [columnTypes]="columnTypes"
          [gridOptions]="gridOptions"
          [pagination]="true"
          [localeText]="localeText"
          [rowHeight]="20"
          [headerHeight]="24"
          [defaultColDef]="defaultColDef"
          [paginationPageSize]="20"
          (gridReady)="onGridReady($event)"/>
      </div>
    </div>
  </div>
</div>
