<div class="contenedor-principal">
  <!-- Panel izquierdo - Tabla -->
  <div class="panel-izquierdo">
    <div class="cont-title">
      <span>Lista de documentos por pagar</span>
    </div>

    <!-- Indicadores -->
    <div class="cont-cards">

      <div class="card">
        <div class="contenido">
          <span class="title">Total importe por pagar</span>
          @if(isLoading()){
            <ion-skeleton-text [animated]="true" style="width: 30px; height: 16px;"></ion-skeleton-text>
          }@else {
            <span class="cantidad">S/ 525,000.00</span>
          }
        </div>
        <div class="icon">
          <fa-icon [icon]="fasDollarSign"></fa-icon>
        </div>
      </div>

      <div class="card">
        <div class="contenido">
          <span class="title">Total pendiente por pagar</span>
          @if(isLoading()){
            <ion-skeleton-text [animated]="true" style="width: 30px; height: 16px;"></ion-skeleton-text>
          }@else {
            <span class="cantidad !text-danger">S/ 43,750.00</span>
          }
        </div>
        <div class="icon">
          <fa-icon [icon]="fasExclamation"></fa-icon>
        </div>
      </div>
    </div>

    <!-- Filtros -->
    <div class="contenedor-filtros !pt-0">
      <div class="buscador">
        <fa-icon [icon]="farSearch"></fa-icon>
        <ion-input fill="outline" placeholder="Ingresa nº de comprobante y presiona enter" style="--padding-start:30px"></ion-input>
      </div>
      <div class="flex flex-row">
          <ion-select value="0" toggleIcon="chevron-down" expandedIcon="chevron-up" interface="popover" fill="outline" class="w-[110px] flex-none">
            <ion-select-option value="0">De emisión</ion-select-option>
            <ion-select-option value="1">De vencimiento</ion-select-option>
          </ion-select>
         <!-- calendario -->
        <app-base-calendar-new
            class="flex-none" 
            mode="range"
            [initialStartDate]="startDate"
            [initialEndDate]="endDate"
            [minDate]="minDate"
            [maxDate]="maxDate"
            position="left"
            (dateRangeSelected)="filtrarPorFechas($event)">
          </app-base-calendar-new>
        </div>

      <div class="filtros-absolutos">
        <ion-button fill="outline"class="w-[115px]" id="reportesactivosdepreciacion">
          <fa-icon [icon]="fasDownload" class="mr-1"></fa-icon>
          <span>Exportar</span>
          <fa-icon class="ml-1" [icon]="fasAngleDown"></fa-icon>
        </ion-button>
        <ion-popover trigger="reportesactivosdepreciacion" triggerAction="click" [dismissOnSelect]="true"
          class="popoverCustomButtonUbicacionActivos dezplegableAcciones" [showBackdrop]="false">
          <ng-template>
            <ion-item lines="none" [button]="true" [detail]="false">Exportar Excel</ion-item>
            <ion-item lines="none" [button]="true" [detail]="false">Exportar PDF</ion-item>
          </ng-template>
        </ion-popover>
      </div>
    </div>

    <div class="h-full flex-grow-1 relative" [appLoader]="isLoading()">
       <fa-icon [icon]="fasRotateRight" (click)="onBtReset()" class="btn-refresh"></fa-icon>
      <ag-grid-angular 
        style="width: 100%; height: 100%;" 
        class="" 
        [rowData]="rowData" 
        [columnDefs]="colDefs"
        [columnTypes]="columnTypes"
        [context]="context" 
        [pagination]="true" 
        [localeText]="localeText" 
        [purgeClosedRowNodes]="true"
        [rowHeight]="20" 
        [headerHeight]="24" 
        [paginationPageSize]="20" 
        (gridReady)="onGridReady($event)"
        (rowClicked)="onCellClicked($event)" 
        [rowSelection]="'single'" />
    </div>
  </div>
</div>
