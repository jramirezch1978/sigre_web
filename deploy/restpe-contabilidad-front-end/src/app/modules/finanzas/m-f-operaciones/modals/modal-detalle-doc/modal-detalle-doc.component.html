<div class="contenedor-modal !w-[660px]">
  <div class="header">
    <div class="flex items-center gap-1 ">
      <span class="text-sm font-bold">{{tituloModal}}</span>
    </div>
    <fa-icon [icon]="farXmark" class="text-sm cursor-pointer" (click)="cerrarModal()"></fa-icon>
  </div>
  <div class="cont-modal"> 
      <div class="h-[180px]">
        <div class="form-column2">
          @for (detalle of detalles; track detalle.label; let i = $index) {
            <div class="contenido-formulario">
              <span class="labelModal">{{detalle.label}}:</span>
              <span class="text-xxs xl:text-xs whitespace-nowraps w-full">{{detalle.value}}</span>
            </div>
          }
        </div>
      </div>
    <div class="flex justify-end flex-row gap-3">
      <ion-button fill="outline" [color]="colorBoton" class="w-fit !text-text-85" (click)="aplicarAccion('secundaria')">{{textoBotonSecundario}}</ion-button>
      @if(mostrarBotonPrimario){<ion-button class="w-fit" (click)="aplicarAccion('primaria')">{{textoBotonPrimario}}</ion-button>}
    </div>
  </div>
</div>
