<div class="flex flex-col bg-[#e7e7e7] px-[7px] gap-0.5 py-[5px]" style="width: 492px;">
  <div class="flex justify-between items-center w-full py-1">
    <div class="flex items-center gap-1">
    <fa-icon [icon]="farScrewdriverWrench" class="text-primary"></fa-icon>
      <span class="text-sm font-bold">Ajuste manual de proyección</span>
    </div>
    <fa-icon [icon]="farXmark" class="text-sm cursor-pointer" (click)="cerrarModal()"></fa-icon>
  </div>
  
  <div class="flex flex-col bg-white p-2.5 gap-1.5">
    <form [formGroup]="ajusteForm" class="flex flex-col gap-1.5">
      <!-- Tipo de ajuste -->
      <div class="flex gap-1.5">
        <label class="text-xxs w-[100px]">
          Tipo de ajuste <span class="text-danger">*</span>
        </label>
        <ion-select 
          class="w-48"
          fill="outline" 
          formControlName="tipoAjuste"
          placeholder="Selecciona tipo"
          toggleIcon="chevron-down" 
          expandedIcon="chevron-up" 
          interface="popover"
          [class.ion-invalid]="isFieldInvalid('tipoAjuste')">
          @for(tipo of tipoAjusteList; track tipo.id) {
            <ion-select-option [value]="tipo.id">{{ tipo.nombre }}</ion-select-option>
          }
        </ion-select>
      </div>

      <!-- Categoría -->
      <div class="flex gap-1.5">
        <label class="text-xxs w-[100px]">Categoría <span class="text-danger">*</span></label>
        <ion-select 
          class="w-48"
          fill="outline" 
          formControlName="categoria"
          placeholder="Selecciona categoría"
          toggleIcon="chevron-down" 
          expandedIcon="chevron-up" 
          interface="popover">
          @for(cat of categoriasList; track cat.id) {
            <ion-select-option [value]="cat.id">{{ cat.nombre }}</ion-select-option>
          }
        </ion-select>
      </div>

      <!-- Monto -->
      <div class="flex gap-1.5">
        <label class="text-xxs w-[100px]">
          Monto <span class="text-danger">*</span>
        </label>
        <ion-input 
          class="w-48"
          fill="outline" 
          type="number"
          formControlName="monto"
          placeholder="0.00"
          [class.ion-invalid]="isFieldInvalid('monto')">
        </ion-input>
      </div>

      <!-- Motivo de ajuste -->
      <div class="flex flex-col gap-1.5 mb-3">
        <label class="text-sm font-bold">Motivo de ajuste</label>
        <ion-textarea
          formControlName="motivoAjuste"
          rows="4" 
          fill="outline"
          class="w-full text-sm" 
          placeholder="Describe el motivo del ajuste">
        </ion-textarea>
      </div>
    </form>

    <!-- Botones -->
    <div class="flex justify-end flex-row gap-3">
      <ion-button color="medium" fill="outline" class="w-fit" (click)="cancelar()">
        Cancelar
      </ion-button>
      <ion-button 
        color="primary" 
        class="w-fit" 
        (click)="confirmarAjuste()"
        [disabled]="ajusteForm.invalid">
        Confirmar ajuste
      </ion-button>
    </div>
  </div>
</div>
