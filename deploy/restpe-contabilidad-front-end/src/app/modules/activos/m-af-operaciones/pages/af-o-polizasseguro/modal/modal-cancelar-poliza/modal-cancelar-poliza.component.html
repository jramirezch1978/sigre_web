<div class="contenedor-modal">
  <div class="header">
    <h2 class="text-sm font-bold pl-2">Anular Póliza de Seguro: {{ poliza?.codigo }}</h2>
    <fa-icon [icon]="farXmark" class="text-sm cursor-pointer" (click)="cerrarModal()"></fa-icon>
  </div>
  
  <div class="cont-modal">
    <h3 class="text-sm font-semibold">Detalle de Póliza</h3>
    
    <div class="flex flex-col gap-2">
      <div class="flex gap-4 font-semibold text-xs">
        <span class="w-[180px]">N° de Póliza:</span>
        <span>{{ poliza?.codigo }}</span>
      </div>
      
      <div class="flex gap-4 font-semibold text-xs">
        <span class="w-[180px]">F. de Inicio:</span>
        <span>{{ poliza?.fechaInicio }}</span>
      </div>
      
      <div class="flex gap-4 font-semibold text-xs">
        <span class="w-[180px]">F. de Vencimiento:</span>
        <span>{{ poliza?.fechaVencimiento }}</span>
      </div>
    </div>

    <div class="flex flex-col gap-1.5">
      <label class="text-sm font-semibold">Motivo de cancelación:</label>
      <ion-textarea 
        fill="outline" 
        [(ngModel)]="motivoCancelacion"
        rows="2" readonly="true"
        class="w-full py-2">
      </ion-textarea>
    </div>
    
    <!-- Botón Cerrar -->
    <div class="contenedor-btn !p-0">
      <ion-button fill="outline" color="danger" class="w-[120px]" (click)="cancelarPoliza()">
        Anular
      </ion-button>
    </div>
  </div>
</div>
