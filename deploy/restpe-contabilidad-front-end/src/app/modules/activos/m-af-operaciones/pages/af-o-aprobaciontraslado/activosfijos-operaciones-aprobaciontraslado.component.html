<div class="contenedor-principal">
  <div class="panel-izquierdo">
    <div class="cont-title">
      <span>Aprobación de traslados pendientes</span>
    </div>
    <!-- filtros -->
    <div class="contenedor-filtros">
      <div class="filtros-responsive">
        <div class="buscador">
          <fa-icon [icon]="farSearch"></fa-icon>
          <ion-input fill="outline" placeholder="Buscar por N° de traslado" class="w-full"
            style="--padding-start:30px"></ion-input>
        </div>
        <div class="filtros-absolutos">
          <!-- <ion-select placeholder="Todos" toggleIcon="chevron-down" expandedIcon="chevron-up"
            [(ngModel)]="estadoSeleccionado" [ngModelOptions]="{standalone: true}" interface="popover" fill="outline"
            class="w-[163px] flex-none">
            <ion-select-option value="todos">Todos los estados</ion-select-option>
            <ion-select-option value="pendiente">Pendiente</ion-select-option>
            <ion-select-option value="aprovado">En revisión</ion-select-option>
            <ion-select-option value="ejecutado">Aprovado</ion-select-option>
            <ion-select-option value="rechazado">Rechazado</ion-select-option>
          </ion-select> -->

        </div>

      </div>
      <app-base-calendar-new class="flex-none " mode="range" [initialStartDate]="startDate" [initialEndDate]="endDate"
        [minDate]="minDate" [maxDate]="maxDate" position="right" (dateRangeSelected)="filtrarPorFechas($event)">
      </app-base-calendar-new>
      <div class="filtros-absolutos">
        <ion-button fill="outline" class="w-[115px] flex-none text-text-85" id="aprobaciontraslado">
          <fa-icon [icon]="fasDownload" class="mr-1"></fa-icon>
          <span>Exportar</span>
          <fa-icon class="ml-1" [icon]="fasAngleDown"></fa-icon>
        </ion-button>
        <ion-popover trigger="aprobaciontraslado" triggerAction="click" [dismissOnSelect]="true"
          class="popoverCustomButtonUbicacionActivos " [showBackdrop]="false">
          <ng-template>
            <ion-item lines="none" [button]="true" [detail]="false">Exportar Excel</ion-item>
            <ion-item lines="none" [button]="true" [detail]="false">Exportar PDF</ion-item>
          </ng-template>
        </ion-popover>
        <ion-button class="w-fit" (click)="modalverAprobar()" [disabled]="!tieneMultiplesSelecciones"><span
            class="font-normal">Aprobar</span></ion-button>
      </div>
    </div>
    <div class="flex h-full relative" [appLoader]="facade.loadingObtener()">
      <fa-icon [icon]="fasRotateRight" (click)="onBtReset()" class="btn-refresh"></fa-icon>
      <ag-grid-angular 
        style="width: 100%; height: 100%;" 
        class="ag-theme-alpine" 
        [rowSelection]="rowSelection"
        [initialState]="initialState" 
        [rowData]="rowData" 
        [rowHeight]="20" 
        [headerHeight]="24" 
        [pagination]="true"
        [columnDefs]="colDefs" 
        [rowSelection]="'multiple'" 
        [domLayout]="'normal'" 
        [localeText]="localeText"
        [defaultColDef]="defaultColDef"
        (gridReady)="onGridReady($event)"
        (cellClicked)="onCellClicked($event)"
        (selectionChanged)="onSelectionChanged()" 
        [suppressLoadingOverlay]="true"
        [purgeClosedRowNodes]="true" />
    </div>
  </div>
  <div class="panel-derecho" [appLoader]="facade.loadingObtener()">
    <div class="cont-title">
      <span>Información del traslado {{ filaSeleccionada?.atr_numero_traslado }}</span>
    </div>
    @if (filaSeleccionada) { 
    <div class="cont-actualizaciones">
      <div class="btn-actualizaciones" (click)="modalverActualizaciones()">
        <fa-icon [icon]="farBook" ></fa-icon>
        <span class="text-actualizaciones">Ver últimas actualizaciones</span>
      </div>
    </div>
  }
    <ion-segment [(ngModel)]="tabSeleccionadoDetalle" mode="md" class="company-tabs">
      <ion-segment-button value="general" class="boton-tabs-formulario">
        <ion-label>Datos Generales</ion-label>
      </ion-segment-button>
      <ion-segment-button value="ubicacion" class="boton-tabs-formulario">
        <ion-label>Ubicación del Traslado</ion-label>
      </ion-segment-button>
    </ion-segment>

    <div class="flex flex-col gap-1 h-full w-full">
      <div [hidden]="tabSeleccionadoDetalle !== 'general'">
      <app-at-tab-general [datosTraslado]="filaSeleccionada"
          (formValidChange)="onGeneralFormValidChange($event)"></app-at-tab-general>
      </div>
      <div [hidden]="tabSeleccionadoDetalle !== 'ubicacion'">
        <app-at-tab-ubicacion [datosTraslado]="filaSeleccionada" [mostrartabla]="mostrartabla"></app-at-tab-ubicacion>
      </div>
      <div class="contenedor-btn">
        <ion-button class="w-[70px]" (click)="botonGuardar()" [disabled]="!filaSeleccionada"><span
            class="font-normal whitespace-nowrap">Aprobar</span></ion-button>
        <ion-button fill="outline" color="danger" class="w-[70px]" [disabled]="!filaSeleccionada"><span
            class="font-normal whitespace-nowrap border-danger"
            (click)="modalverRechazar()">Rechazar</span></ion-button>
      </div>
    </div>

  </div>
</div>
