<div class="flex flex-row gap-1 w-full" [ngClass]="{'!flex-col': mostrartabla}" [formGroup]="formGroup">
  <div class="contenedor-formulario !p-0">
    <div class="contenido-formulario">
      <span class="label">Fecha de comunicación</span>
      @if(soloVista) {
        <ion-input fill="outline" class="w-[163px]" formControlName="fechaComunicacion"></ion-input>
      } @else {
        <app-base-calendar-new
          class="flex-none"
          mode="single"
          position="center"
          [initialDate]="formGroup.get('fechaComunicacion')?.value"
          (dateSelected)="onFechaComunicacion($event)">
        </app-base-calendar-new>
      }
    </div>
    <div class="contenido-formulario">
      <span class="label">Estado del reclamo <span class="font-bold text-danger">*</span></span>
      @if(soloVista) {
        <ion-input fill="outline" class="w-[163px]" formControlName="estadoReclamo"></ion-input>
      } @else {
        <ion-select placeholder="Selecciona un estado" toggleIcon="chevron-down" expandedIcon="chevron-up" interface="popover" fill="outline" class="w-[163px] flex-none" formControlName="estadoReclamo">
          @for(item of tabestadodereclamo; track item.value){
            <ion-select-option [value]="item.value">{{item.nombre}}</ion-select-option>
          }
        </ion-select>
      }
    </div>
    <div class="contenido-formulario">
      <span class="label">Formulario de reclamo</span>
      <div class="flex flex-col xl:flex-row gap-1" [ngClass]="{'!flex-row': !mostrartabla}">
        <div class="xl:w-[163px] border border-solid rounded-[2px] h-[28px] flex items-center px-2">
          <span class="text-xxs"> UNPDFCHEVERE.PDF</span>
        </div>
        <ion-button class="p-0 m-0 w-[70px]" fill="outline">
          <span class="text-xs">Descargar</span>
        </ion-button>
      </div>
    </div>
  </div>
  <div class="contenedor-formulario !p-0">
    <div class="contenido-formulario">
      <span class="label">Fecha de respuesta</span>
      @if(soloVista) {
        <ion-input fill="outline" class="w-[163px]" type="date" formControlName="fechaRespuesta"></ion-input>
      } @else {
        <app-base-calendar-new
          class="flex-none"
          mode="single"
          position="center"
          [initialDate]="formGroup.get('fechaRespuesta')?.value"
          (dateSelected)="onFechaRespuesta($event)">
        </app-base-calendar-new>
      }
    </div>
    <div class="contenido-formulario">
      <span class="label">Monto solicitado</span>
      <div class="flex flex-col xl:flex-row gap-1 xl:gap-0" [ngClass]="{'!flex-row !gap-0': !mostrartabla}">
        <ion-input fill="outline" placeholder="0.00" class="w-[80px]" formControlName="montoSolicitado"/>
        <ion-select toggleIcon="chevron-down" expandedIcon="chevron-up" interface="popover" fill="outline" class="!w-[50px] flex-none" formControlName="monedaSolicitado">
          <ion-select-option value="soles">Soles</ion-select-option>
          <ion-select-option value="dolares">Dólares</ion-select-option>
        </ion-select>
      </div>
    </div>
  </div>
</div>
