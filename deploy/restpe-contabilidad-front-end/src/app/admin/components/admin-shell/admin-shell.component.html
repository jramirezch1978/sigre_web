<div class="admin-layout" [class.admin-layout--collapsed]="!menuAbierto">
  <aside class="admin-sidebar">
    <div class="admin-sidebar__header">
      <img src="assets/imagenes/auth/logo-contabilidad.svg" alt="Logo" class="admin-sidebar__logo" />
      @if (menuAbierto) {
        <span class="admin-sidebar__brand">Admin</span>
      }
      <button class="admin-sidebar__toggle-btn" (click)="toggleMenu()">
        <ion-icon [name]="menuAbierto ? 'chevron-back-outline' : 'chevron-forward-outline'" aria-hidden="true"></ion-icon>
      </button>
    </div>

    <nav class="admin-sidebar__nav">
      @for (item of menuItems; track item.route) {
        <button class="admin-sidebar__item"
                [class.admin-sidebar__item--active]="isActive(item.route)"
                (click)="navegar(item.route)"
                [title]="item.label">
          <ion-icon [name]="item.icon" aria-hidden="true"></ion-icon>
          @if (menuAbierto) {
            <span>{{ item.label }}</span>
          }
        </button>
      }
    </nav>

    <div class="admin-sidebar__footer">
      @if (menuAbierto) {
        <small class="admin-sidebar__context">{{ empresaLabel }}</small>
      }
      <button class="admin-sidebar__item" (click)="irAlErp()" title="Ir al ERP">
        <ion-icon name="arrow-back-outline" aria-hidden="true"></ion-icon>
        @if (menuAbierto) { <span>Ir al ERP</span> }
      </button>
      <button class="admin-sidebar__item admin-sidebar__item--danger" (click)="cerrarSesion()" title="Cerrar sesión">
        <ion-icon name="log-out-outline" aria-hidden="true"></ion-icon>
        @if (menuAbierto) { <span>Cerrar sesión</span> }
      </button>
    </div>
  </aside>

  <main class="admin-main">
    <router-outlet></router-outlet>
  </main>
</div>
