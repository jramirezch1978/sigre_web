<div class="flex flex-row h-full">
  @for(item of menu; track item.key){
  <div class="relative h-full" (mouseenter)="onMouseEnter(item.key)" (mouseleave)="onMouseLeave()">
    
    <a routerDirection="root" routerLinkActive="__active" #rla="routerLinkActive" [routerLinkActiveOptions]="{ exact: item.exact }" class="button_sidebar" 
        [ngClass]="{ 'underline text-primary !bg-primary-5': selectedMenuItem === item.label, 'text-[#1F1F1F]': selectedMenuItem !== item.label }">
      
        <span>{{ item.label }}</span>
        @if(item.subMenu && hoveredItem !== item.key){<fa-icon [icon]="fasAngleDown"></fa-icon>}
        @if(item.subMenu && hoveredItem === item.key){<fa-icon [icon]="fasAngleUp"></fa-icon>}
   
    </a>

    @if(hoveredItem === item.key && item.subMenu){
    <div class="fixed bg-white shadow-lg min-w-[200px] z-[9999] mt-[0.5px] p-4 columns-3 gap-6" 
            [ngClass]="{'!columns-1': item.label === 'Producción',
                        'max-lg:right-[184px] max-xl:right-[calc(100%-770px)]': item.label === 'RR.HH',
                        'max-lg:right-0 max-2xl:right-[calc(100%-1080px)] columns-2': item.label === 'Configuración',
                        '!columns-2': item.label === 'Ventas',}"
                        
        style="column-rule: 1px solid #e5e7eb;">

      @for(subItem of item.subMenu; track subItem){
      <div class="break-inside-avoid" >
        
        <span class="font-bold text-sm text-[#1F1F1F]">{{ subItem.label }}</span>
        <div class="flex flex-col mt-2">
          <div (click)="cambiardemodulo(subSubItem, subItem.label, item.label)" class="hover:text-primary cursor-pointer hover:bg-primary-5 text-xs text-[#646464] py-1 px-3" 
                [ngClass]="{'text-primary bg-primary-5 underline': selectedSubSubItem === subSubItem.label}" *ngFor="let subSubItem of subItem.subSubMenu">
            {{subSubItem.label}}
          </div>
        </div>
      
      </div>
      }
    </div>
    }
  </div>
  }
</div>
