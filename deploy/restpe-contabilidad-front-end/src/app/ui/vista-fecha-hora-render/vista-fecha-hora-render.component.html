<div class="flex gap-1 justify-center items-center h-full cursor-pointer" [ngClass]="{'flex-col !items-start !cursor-default h-[50px]': vertical}" (click)="onDetalleClick($event)" title="Ver detalle">
  <div class="flex items-center gap-1 h-4">
    <fa-icon [icon]="farCalendar"></fa-icon>
    <span>{{ fecha }}</span>
  </div>
  <div class="flex items-center gap-1 h-4">
    <fa-icon [icon]="farClock"></fa-icon>
    <span>{{ hora }}</span>
  </div>
</div>
