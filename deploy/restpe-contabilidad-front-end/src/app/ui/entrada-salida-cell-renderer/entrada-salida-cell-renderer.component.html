<div class="entrada-salida-container">
  @if(datos) {
      <div class="datos">
        <fa-icon [icon]="falCalendar" class="icon"></fa-icon>
        <span>{{ datos.fecha }}</span>
      </div>
      <div class="datos">
        <fa-icon [icon]="falClock" class="icon"></fa-icon>
        <span>{{ datos.hora }}</span>
      </div>
       <div class="datos">
        <span>Turno {{ datos.turno }}</span>
      </div>
  }
</div>
