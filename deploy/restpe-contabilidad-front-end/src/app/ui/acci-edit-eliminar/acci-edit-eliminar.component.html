<div class="flex justify-center items-center gap-2 h-full">
  <button class="text-xxs flex items-center justify-center cursor-pointer text-primary" (click)="onEditClick($event)" title="Editar">
    <fa-icon [icon]="farEdit" class="text-xxs"></fa-icon>
  </button>
  <button class="text-danger text-xxs flex items-center justify-center cursor-pointer" (click)="onDeleteClick($event)" title="Eliminar">
    <fa-icon [icon]="farTrashAlt"></fa-icon>
  </button>
</div>
