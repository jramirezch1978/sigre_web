<div class="flex flex-col gap-0.5 w-full h-[53px]">
  @if (documento) {
    <span class="!leading-normal"><strong>Documento:</strong> {{ documento }}</span>
  }
  @if (estados.length > 0) {
    <div class="flex items-center w-full gap-1">
      <span class="!leading-normal"><strong>Estado:</strong></span>
      <span class="badge-estado" [ngClass]="estados[0].tipo">{{ estados[0].texto }}</span>
    </div>
  }
  <div class="flex items-center w-full gap-1">
    @for (estado of estados; track $index) {
      @if ($index > 0) {
        <span class="badge-estado" [ngClass]="estado.tipo">{{ estado.texto }}</span>
      }
    }
  </div>
</div>
