<div class="relative" [ngClass]="width">
  <!-- Input principal -->
  <div 
    class="flex items-center justify-between border border-solid border-text-5 rounded-sm px-2.5 h-[28px] cursor-pointer bg-white transition-colors"
    [class.opacity-50]="disabled"
    [class.cursor-not-allowed]="disabled"
    (click)="toggleDropdown()">
    
    <span class="xl:text-xs text-xxs flex-1 line-clamp-1 text-text-10" [class.text-[#878787]]="!opcionSeleccionada">
      {{ textoMostrado }}
    </span>

    <div class="flex items-center gap-1">
      @if (opcionSeleccionada && !disabled) {
        <fa-icon 
          [icon]="fasTimes" 
          class="text-xxs text-[#878787] cursor-pointer"
          (click)="limpiarSeleccion(); $event.stopPropagation()">
        </fa-icon>
      }
      <fa-icon 
        [icon]="isOpen ? fasChevronUp : fasChevronDown" 
        class="text-xxs text-[#878787]">
      </fa-icon>
    </div>
  </div>

  <!-- Dropdown -->
  @if (isOpen) {
    <div class="absolute z-50 w-full bg-white border border-solid border-[#D1D5DB] rounded shadow-lg">
      
      <!-- Modo normal: lista de opciones -->
      @if (!modoPersonalizado) {
        <div class="max-h-[200px] overflow-y-auto">
          @for (opcion of opciones; track opcion.value) {
            <div 
              class="px-3 py-2 xl:text-xs text-xxs cursor-pointer hover:bg-[#F3F4F6] transition-colors"
              [class.bg-[#ECF4FF]]="opcionSeleccionada?.value === opcion.value"
              (click)="seleccionarOpcion(opcion)">
              {{ opcion.label }}
            </div>
          }
        </div>
      }

      <!-- Modo personalizado: inputs desde/hasta -->
      @if (modoPersonalizado) {
        <div class="p-3 flex flex-col gap-3">
          <div class="flex items-center justify-between mb-2 cursor-pointer hover:bg-light" (click)="volverAOpciones()">
            <span class="xl:text-xs text-xxs font-semibold text-text-85">Rango personalizado</span>
          </div>

          <div class="flex flex-col gap-2">
            <div class="flex flex-col gap-1">
              <span class="text-xxs text-text-85">Desde</span>
              <ion-input 
                fill="outline" 
                type="number" 
                placeholder="0.00"
                [(ngModel)]="valorDesde"
                class="text-xs">
              </ion-input>
            </div>

            <div class="flex flex-col gap-1">
              <span class="text-xxs text-text-85">Hasta</span>
              <ion-input 
                fill="outline" 
                type="number" 
                placeholder="0.00"
                [(ngModel)]="valorHasta"
                class="text-xs">
              </ion-input>
            </div>
          </div>

          @if (mostrarBotonConfirmar) {
            <ion-button 
              size="small" 
              class="w-full mt-2"
              (click)="confirmarRangoPersonalizado()">
              Confirmar
            </ion-button>
          }
        </div>
      }
    </div>
  }
</div>
