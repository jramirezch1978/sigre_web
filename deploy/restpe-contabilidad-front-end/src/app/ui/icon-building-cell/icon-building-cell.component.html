<span class="flex items-center gap-2">
  @if(nivel == 0){
    <fa-icon [icon]="farBuilding" class="text-[#1F1F1F] text-xxss"></fa-icon>
    <span class="text-xxs">{{ params.value }}</span>
    @if(params.data?.esSucursal){
      <span class="badge-table !w-[75px] bg-[#DCFDE7] text-[#16A34A]">
        {{ params.data.comprobantesCount || 0 }} comprobantes
      </span>
    }
  }
</span>
