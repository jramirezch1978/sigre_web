<div class="cell-container">
  <span class="asiento-text" [innerHTML]="value"></span>
  @if (value && value !== '-' && value !== '-') {
    <span class="icon-container cursor-pointer" (click)="abrirModal($event)">
      <fa-icon [icon]="farEye" class="text-primary icon-eye" title="Ver detalle"></fa-icon>
    </span>
  }
</div>
