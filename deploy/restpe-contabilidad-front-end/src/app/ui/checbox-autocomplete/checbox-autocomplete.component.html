<div class="relative" [ngClass]="width">
  <!-- Select field -->
  <div class="flex items-center px-2 h-[28px] justify-between border border-solid border-[#b5b8c8] rounded-sm cursor-pointer bg-white"
    (click)="toggleDropdown()">
    <span class="text-xs" [ngClass]="{'text-text-25': !displayText}">
      {{displayText || placeholder}}
    </span>
    <fa-icon [icon]="showDropdown ? fasChevronUp : fasChevronDown" class="text-xxs text-text-85"></fa-icon>
  </div>
  <!-- Dropdown -->
  @if(showDropdown) {
  <div class="absolute top-[30px] left-0 right-0 bg-white border border-gray-300 rounded-md shadow-lg z-50 max-h-[300px] flex flex-col">
    <!-- Autocomplete search -->
    <div class="p-2 border-b border-gray-200">
      <div class="relative">
        <fa-icon [icon]="farSearch" class="absolute left-2 top-1/2 -translate-y-1/2 text-xxs text-text-85"></fa-icon>
        <input
          type="text"
          [(ngModel)]="searchText"
          (ngModelChange)="onSearchChange()"
          [placeholder]="searchPlaceholder"
          class="w-full h-[28px] pl-7 pr-2 text-xs border border-gray-300 rounded-sm focus:outline-none focus:border-primary"
        />
      </div>
    </div>
    <div class="p-1 border-gray-200 flex items-center text-center cursor-pointer">
      <span
        class="w-full text-xs underline text-primary"
        (click)="onButtonClick()">
        {{buttonText}}
      </span>
    </div>
    <!-- Checkbox list -->
    <div class="flex-1 overflow-y-auto max-h-[180px] p-2">
      @if(filteredItems.length === 0) {
        <div class="text-xs text-text-25 text-center py-2">No se encontraron resultados</div>
      } @else {
        @for(item of filteredItems; track item[valueKey]) {
          <div class="flex items-center gap-2 px-2 py-1.5 hover:bg-gray-50 rounded cursor-pointer"
            (click)="toggleItem(item, $event)">
            <ion-checkbox
              [checked]="isSelected(item)"
              (change)="toggleItem(item, $event)"
              class="w-4 h-4 cursor-pointer"
            />
            <span class="text-xs">{{getDisplayValue(item)}}</span>
          </div>
        }
      }
    </div>

    <!-- Button -->
    
  </div>
  }
</div>
